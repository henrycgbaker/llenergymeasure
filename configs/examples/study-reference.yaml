# Maximal study reference - exercises all sweep and execution parameters
# Run: llem run configs/examples/study-reference.yaml
#
# This template demonstrates every sweep axis, execution option, and study
# feature available. It uses per-backend scoped sweeps (dotted paths) to
# avoid invalid cross-backend combinations.
#
# This file is the "everything showcase" - see the other study-*.yaml files
# for focused, practical examples.
#
# Sweep: 48 pytorch + 0 vllm + 0 tensorrt = 48 experiments (vllm/trt have no scoped dims active)
# Explicit: 4 experiments (synthetic data, aggressive vLLM, TRT quantisation, fp32 baseline)
# Total: 52 unique experiments x 3 cycles = 156 runs, 0 skipped

name: reference-sweep

# --- Shared fields (applied to every experiment in the grid) ---
dataset: aienergyscore
max_input_tokens: 512
max_output_tokens: 128
random_seed: 42

energy:
  backend: auto

warmup:
  enabled: true
  n_warmup: 3
  thermal_floor_seconds: 30.0
  # Convergence detection can be enabled study-wide:
  # convergence_detection: true
  # cv_threshold: 0.05

baseline:
  enabled: true
  duration_seconds: 30.0

# =====================================================================
# Sweep axes
# =====================================================================
# Universal axes cross with ALL backends.
# Dotted paths (e.g. pytorch.batch_size) are scoped to that backend only.
# Backends are auto-determined from dotted key prefixes.
sweep:
  # --- Universal axes ---
  model:
    - meta-llama/Llama-3.2-1B
    - Qwen/Qwen2.5-0.5B
  precision:
    - bf16
    - fp16
  n:
    - 50
    - 100

  # --- PyTorch-scoped axes ---
  # 2 model x 2 precision x 2 n x 3 batch x 2 attn = 48 pytorch experiments
  pytorch.batch_size:
    - 1
    - 4
    - 8
  pytorch.attn_implementation:
    - sdpa
    - flash_attention_2

  # --- vLLM-scoped axes ---
  # 2 model x 2 precision x 2 n = 8 vllm experiments (no extra scoped dims)
  # Add vllm-scoped params to expand:
  # vllm.engine.gpu_memory_utilization:
  #   - 0.8
  #   - 0.9

  # --- TensorRT-scoped axes ---
  # 2 model x 2 precision x 2 n = 8 raw, but TRT only supports fp16/bf16,
  # so no fp32-related skips.
  # tensorrt.max_batch_size:
  #   - 4
  #   - 8

# =====================================================================
# Explicit experiments (appended after sweep expansion)
# =====================================================================
# Use for one-off configs that don't fit the grid pattern.
experiments:
  # fp32 baseline (only makes sense for PyTorch)
  - model: meta-llama/Llama-3.2-1B
    backend: pytorch
    precision: fp32
    n: 25
    decoder:
      preset: deterministic
    pytorch:
      batch_size: 8
      attn_implementation: flash_attention_2

  # Synthetic dataset example
  - model: Qwen/Qwen2.5-0.5B
    backend: pytorch
    precision: bf16
    n: 50
    dataset:
      n: 50
      input_len: 256
      output_len: 64
      seed: 42
    decoder:
      preset: deterministic

  # LoRA adapter example (uncomment adapter_id for real use)
  # - model: meta-llama/Llama-3.2-1B
  #   backend: pytorch
  #   precision: bf16
  #   n: 25
  #   lora:
  #     adapter_id: my-org/my-lora-adapter
  #     merge_weights: false
  #   pytorch:
  #     batch_size: 4

  # vLLM with aggressive memory settings
  - model: meta-llama/Llama-3.2-1B
    backend: vllm
    precision: bf16
    n: 50
    vllm:
      engine:
        gpu_memory_utilization: 0.95
        enable_chunked_prefill: true
        enable_prefix_caching: true

  # TensorRT with quantisation
  - model: meta-llama/Llama-3.2-1B
    backend: tensorrt
    precision: bf16
    n: 50
    tensorrt:
      max_batch_size: 8
      max_input_len: 1024
      max_seq_len: 2048
      quant:
        quant_algo: INT8
      build_cache:
        max_cache_storage_gb: 256

# =====================================================================
# Runner configuration
# =====================================================================
# Determines how each backend executes: locally or via Docker.
# Values: 'local', 'docker', or 'docker:<custom-image-tag>'
runners:
  pytorch: local
  vllm: docker
  tensorrt: docker
  # Custom image override example:
  # vllm: "docker:ghcr.io/henrycgbaker/llenergymeasure/vllm:v0.9.0"

# =====================================================================
# Execution controls
# =====================================================================
execution:
  n_cycles: 3                    # Repeat experiment list 3 times
  cycle_order: interleaved       # sequential | interleaved | shuffled
  experiment_gap_seconds: 10.0   # Pause between experiments (thermal stabilisation)
  cycle_gap_seconds: 30.0        # Pause between full cycles
  # shuffle_seed: null           # Explicit seed for shuffled order (null = derived from study hash)
  skip_preflight: false          # Skip Docker pre-flight checks (not recommended)
