# Quick Docker test - PyTorch + vLLM both in Docker
# Run: llem run configs/examples/study-docker-test.yaml
#
# Small config for verifying Docker + NVIDIA runtime setup.
# Uses a tiny model (gpt2) with minimal prompts for fast iteration.

name: docker-display-test

model: gpt2
dataset: aienergyscore
n: 10
max_output_tokens: 50

warmup:
  enabled: true
  n_warmup: 2

baseline:
  enabled: true
  duration_seconds: 10.0

sweep:
  backend:
    - pytorch
    - vllm

runners:
  pytorch: docker
  vllm: docker

execution:
  n_cycles: 1
  cycle_order: sequential
  experiment_gap_seconds: 5.0
