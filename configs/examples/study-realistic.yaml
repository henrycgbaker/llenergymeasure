# Realistic study - compare two models across precision and batch size
# Run: llem run configs/examples/study-realistic.yaml
#
# A practical study comparing inference efficiency of two small models
# across precision settings and batch sizes, with multiple cycles for
# statistical robustness. Demonstrates dotted-path sweep syntax for
# nested backend parameters.

name: model-precision-comparison

# --- Shared fields ---
dataset: aienergyscore
n: 50
max_input_tokens: 512
max_output_tokens: 128
backend: pytorch

decoder:
  preset: deterministic      # Greedy decoding for reproducible results

warmup:
  enabled: true
  n_warmup: 3
  thermal_floor_seconds: 30.0

baseline:
  enabled: true
  duration_seconds: 30.0

# --- Sweep ---
# Each key maps to a list of values. The Cartesian product of all axes
# produces the experiment grid.
sweep:
  model:
    - meta-llama/Llama-3.2-1B
    - Qwen/Qwen2.5-0.5B
  precision:
    - bf16
    - fp16
    - fp32
  # Dotted paths target nested backend fields:
  pytorch.batch_size:
    - 1
    - 4
    - 8

# Produces 2 models x 3 precisions x 3 batch sizes = 18 experiments
# x 3 cycles = 54 total runs

runners:
  pytorch: local

execution:
  n_cycles: 3
  cycle_order: interleaved   # A,B,C,A,B,C... to control for thermal drift
  experiment_gap_seconds: 5.0
  cycle_gap_seconds: 15.0
