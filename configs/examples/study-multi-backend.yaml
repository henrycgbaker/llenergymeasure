# Comprehensive multi-backend study - PyTorch vs vLLM full parameter space
# Run: llem run configs/examples/study-multi-backend.yaml
#
# Explores the full parameter space of both PyTorch and vLLM backends.
# Backend-specific params use dotted paths (e.g. pytorch.batch_size) so each
# backend's parameters are swept independently - no invalid cross-combinations.
#
# Requires Docker for the vLLM backend.
#
# To add TensorRT-LLM once your CUDA toolkit is up to date:
#   1. Add tensorrt-scoped sweep axes (e.g. tensorrt.max_batch_size)
#   2. Add 'tensorrt: docker' to the runners section
#   3. Add explicit tensorrt experiments below
#
# Sweep experiments:
#   PyTorch: 2 precision x 4 batch_size x 3 attn_implementation = 24
#   vLLM:    2 precision x 3 gpu_mem x 2 enforce_eager x 3 max_num_seqs x 2 chunked_prefill = 72
# Explicit experiments: 16 (torch.compile, quantization, beam search, caching, etc.)
# Total: 112 unique experiments x 3 cycles = 336 runs

name: multi-backend-full-parameter-space

# =====================================================================
# Shared fields (applied to every experiment)
# =====================================================================
model: meta-llama/Llama-3.2-1B
dataset: aienergyscore
n: 50
max_input_tokens: 512
max_output_tokens: 128

decoder:
  preset: deterministic        # Greedy decoding for reproducible comparison

warmup:
  enabled: true
  n_warmup: 3
  thermal_floor_seconds: 30.0

baseline:
  enabled: true
  duration_seconds: 30.0

energy:
  backend: auto

# =====================================================================
# Sweep axes (Cartesian product, per-backend)
# =====================================================================
# Dotted paths (e.g. pytorch.batch_size) are scoped to that backend.
# Each backend's scoped params are crossed ONLY with each other and
# with universal params - never with another backend's params.
# Backends are auto-determined from the dotted key prefixes.
sweep:
  # --- Universal axes (applied to both backends) ---
  precision:
    - bf16
    - fp16

  # --- PyTorch parameter space ---
  # Produces: 2 precision x 4 batch x 3 attn = 24 PyTorch experiments
  pytorch.batch_size:
    - 1
    - 4
    - 8
    - 16
  pytorch.attn_implementation:
    - sdpa
    - flash_attention_2
    - eager

  # --- vLLM parameter space ---
  # Produces: 2 precision x 3 gpu_mem x 2 eager x 3 seqs x 2 prefill = 72 vLLM experiments
  vllm.engine.gpu_memory_utilization:
    - 0.7
    - 0.85
    - 0.95
  vllm.engine.enforce_eager:
    - true
    - false
  vllm.engine.max_num_seqs:
    - 64
    - 128
    - 256
  vllm.engine.enable_chunked_prefill:
    - true
    - false

# =====================================================================
# Explicit experiments (features that don't fit Cartesian products)
# =====================================================================
# Some parameters are mutually exclusive or only valid in specific
# combinations, so they're listed explicitly rather than swept.
experiments:

  # -----------------------------------------------------------------
  # PYTORCH - torch.compile modes
  # -----------------------------------------------------------------
  # torch_compile_mode requires torch_compile: true, so can't be swept
  # alongside torch_compile: false configs.
  - model: meta-llama/Llama-3.2-1B
    backend: pytorch
    precision: bf16
    n: 50
    pytorch:
      batch_size: 4
      torch_compile: true
      torch_compile_mode: default
      torch_compile_backend: inductor
      device_map: auto
      trust_remote_code: true
  - model: meta-llama/Llama-3.2-1B
    backend: pytorch
    precision: bf16
    n: 50
    pytorch:
      batch_size: 4
      torch_compile: true
      torch_compile_mode: reduce-overhead
      torch_compile_backend: inductor
      device_map: auto
      trust_remote_code: true
  - model: meta-llama/Llama-3.2-1B
    backend: pytorch
    precision: bf16
    n: 50
    pytorch:
      batch_size: 4
      torch_compile: true
      torch_compile_mode: max-autotune
      torch_compile_backend: inductor
      device_map: auto
      trust_remote_code: true

  # -----------------------------------------------------------------
  # PYTORCH - BitsAndBytes quantization
  # -----------------------------------------------------------------
  # 4-bit and 8-bit are mutually exclusive - can't be swept together.
  - model: meta-llama/Llama-3.2-1B
    backend: pytorch
    precision: fp16
    n: 50
    pytorch:
      batch_size: 4
      load_in_8bit: true
      device_map: auto
      trust_remote_code: true
  - model: meta-llama/Llama-3.2-1B
    backend: pytorch
    precision: fp16
    n: 50
    pytorch:
      batch_size: 4
      load_in_4bit: true
      bnb_4bit_compute_dtype: float16
      bnb_4bit_quant_type: nf4
      device_map: auto
      trust_remote_code: true
  - model: meta-llama/Llama-3.2-1B
    backend: pytorch
    precision: fp16
    n: 50
    pytorch:
      batch_size: 4
      load_in_4bit: true
      bnb_4bit_compute_dtype: bfloat16
      bnb_4bit_quant_type: nf4
      bnb_4bit_use_double_quant: true
      device_map: auto
      trust_remote_code: true

  # -----------------------------------------------------------------
  # PYTORCH - Beam search
  # -----------------------------------------------------------------
  - model: meta-llama/Llama-3.2-1B
    backend: pytorch
    precision: bf16
    n: 50
    decoder:
      temperature: 0.0
      do_sample: false
    pytorch:
      batch_size: 4
      num_beams: 4
      early_stopping: true
      length_penalty: 1.0
      device_map: auto
      trust_remote_code: true

  # -----------------------------------------------------------------
  # PYTORCH - Speculative decoding (prompt-lookup)
  # -----------------------------------------------------------------
  - model: meta-llama/Llama-3.2-1B
    backend: pytorch
    precision: bf16
    n: 50
    pytorch:
      batch_size: 1
      prompt_lookup_num_tokens: 3
      device_map: auto
      trust_remote_code: true

  # -----------------------------------------------------------------
  # PYTORCH - Static KV cache
  # -----------------------------------------------------------------
  - model: meta-llama/Llama-3.2-1B
    backend: pytorch
    precision: bf16
    n: 50
    pytorch:
      batch_size: 4
      use_cache: true
      cache_implementation: static
      device_map: auto
      trust_remote_code: true

  # -----------------------------------------------------------------
  # PYTORCH - fp32 precision baseline
  # -----------------------------------------------------------------
  - model: meta-llama/Llama-3.2-1B
    backend: pytorch
    precision: fp32
    n: 50
    pytorch:
      batch_size: 4
      device_map: auto
      trust_remote_code: true

  # -----------------------------------------------------------------
  # VLLM - Prefix caching
  # -----------------------------------------------------------------
  - model: meta-llama/Llama-3.2-1B
    backend: vllm
    precision: bf16
    n: 50
    vllm:
      engine:
        enable_prefix_caching: true
        gpu_memory_utilization: 0.9
  - model: meta-llama/Llama-3.2-1B
    backend: vllm
    precision: bf16
    n: 50
    vllm:
      engine:
        enable_prefix_caching: false
        gpu_memory_utilization: 0.9

  # -----------------------------------------------------------------
  # VLLM - KV cache block sizes
  # -----------------------------------------------------------------
  - model: meta-llama/Llama-3.2-1B
    backend: vllm
    precision: bf16
    n: 50
    vllm:
      engine:
        block_size: 8
        gpu_memory_utilization: 0.9
  - model: meta-llama/Llama-3.2-1B
    backend: vllm
    precision: bf16
    n: 50
    vllm:
      engine:
        block_size: 32
        gpu_memory_utilization: 0.9

  # -----------------------------------------------------------------
  # VLLM - Beam search
  # -----------------------------------------------------------------
  - model: meta-llama/Llama-3.2-1B
    backend: vllm
    precision: bf16
    n: 50
    decoder:
      temperature: 0.0
      do_sample: false
    vllm:
      beam_search:
        beam_width: 4
        early_stopping: true
        length_penalty: 1.0

  # -----------------------------------------------------------------
  # VLLM - Sampling penalties
  # -----------------------------------------------------------------
  - model: meta-llama/Llama-3.2-1B
    backend: vllm
    precision: bf16
    n: 50
    decoder:
      temperature: 0.8
      do_sample: true
    vllm:
      sampling:
        presence_penalty: 0.6
        frequency_penalty: 0.6

# =====================================================================
# Runner configuration
# =====================================================================
runners:
  pytorch: docker
  vllm: docker
  # pytorch: local             # Use local runner if PyTorch is installed on host
  # vllm: "docker:ghcr.io/henrycgbaker/llenergymeasure/vllm:v0.9.0"  # Explicit image
  # tensorrt: docker           # Uncomment when adding TensorRT-LLM

# =====================================================================
# Execution controls
# =====================================================================
execution:
  n_cycles: 3
  cycle_order: interleaved     # A,B,C,...,A,B,C... to control for thermal drift
  experiment_gap_seconds: 60.0 # Generous gap for thermal stabilisation
  cycle_gap_seconds: 300.0     # 5-minute gap between full cycles
