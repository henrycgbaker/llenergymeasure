# Full-suite multi-backend study - comprehensive coverage across all backends
# Run: llem run configs/examples/study-full-suite.yaml

study_name: full-suite-all-backends

# =====================================================================
# Runner configuration
# =====================================================================
# Multi-backend runners auto-elevate to docker by default for better isolation and consistency (auto-elevation is configurable (TODO) but recommended).

runners:
  pytorch: local                 # local | docker | Custom image override (e.g. "docker:ghcr.io/henrycgbaker/llenergymeasure/vllm:v0.9.0")
  vllm: docker
  tensorrt: docker

# =====================================================================
# Execution controls (study-level)
# =====================================================================
# Study-level metadata and scheduling parameters.
# Apply globally to all experiments. Non-sweepable.

study_execution:
  n_cycles: 3
  experiment_order: shuffle       # sequential | interleave | shuffle | reverse | latin_square
  shuffle_seed: null              # Explicit override for experiment shuffle order (null = derived from study_design_hash)
  experiment_gap_seconds: 60.0    # Gap for thermal stabilisation
  cycle_gap_seconds: 300.0
  skip_preflight: false           # Skip Docker pre-flight checks (not recommended)

# =====================================================================
# Shared fields (experiment-level)
# =====================================================================
# Experiment-level shared parameters.
# Apply globally to all experiments, unless overridden by sweep or explicit experiments.
# De facto treated as constant controls/defaults, but sweepable.
# Add to sweep if you want to compare across different values of these fields
# (e.g. random_seed for sampling variability, or max_tokens to test throughput scaling).

random_seed: 42 # per-experiment stochasticity, consumed by (i) inference RNG, (ii) prompt ordering (when dataset.order: shuffled)

model: Qwen/Qwen2.5-0.5B

# --- Dataset ---
dataset:
  source: aienergyscore          # Built-in alias or .jsonl file path
  n_prompts: 100                 # Number of prompts to load or generate
  order: interleaved             # interleaved | grouped | shuffled

# Token limits - for FLOPs/computational workload control
max_input_tokens: 256            # null = prompts keep natural length / model generates to EOS; FLOPs uncontrolled between experiments
max_output_tokens: 256

# --- Energy measurement ---
energy_sampler: auto             # auto | nvml | zeus | codecarbon | null (disables)

# --- Baseline power measurement ---
baseline:
  enabled: true
  duration_seconds: 30.0         # 5.0 - 120.0

# --- Warmup ---
warmup:
  enabled: true
  n_warmup: 3 # number of warmup prompts to run before the main experiment? TODO: rename to n_warmup_prompts for clarity
  thermal_floor_seconds: 30.0    # Minimum 30s
  # CV-based convergence detection (opt-in, additive to n_warmup): TODO: use dot notation: warmup.convergence_detection.enabled, warmup.convergence_detection.cv_threshold, etc. for better organization and extensibility; validate that this works as intended (i.e. only runs if enabled: true) and clarify in docs how this interacts with n_warmup (e.g. does it run at least n_warmup prompts and then check for convergence after that until either convergence is reached or max_prompts is reached?)
  # convergence_detection: true # TODO: this seems to run even if if this is commented out - need to validate that this is working as intended (i.e. only runs if enabled: true) / what is default? is this for all backends or just PyTorch? if convergence detection is enabled, how does this interact with n_warmup - does it run at least n_warmup prompts and then check for convergence after that until either convergence is reached or max_prompts is reached? need to clarify this in the docs and validate that it's working as intended
  # cv_threshold: 0.05
  # max_prompts: 20              # Upper bound on warmup prompts TODO: how does this interact w/ n_warmup
  # window_size: 5
  # min_prompts: 5

# --- Decoder / sampling (universal, shared across backends) ---
decoder:
  # preset: deterministic          # Presets override individual params below. Available: deterministic | standard | creative | factual
  temperature: 1.0               # 0.0 (greedy) to 2.0
  do_sample: true
  top_k: 50                      # 0 = disabled
  top_p: 1.0                     # 1.0 = disabled (nucleus sampling)
  repetition_penalty: 1.0        # 1.0 = no penalty
  min_p: null                    # Min probability filter (null = disabled)
  min_new_tokens: null            # Minimum output tokens (null = no minimum)
  #TODO: validate this works + how incompataible params resolution is handled
  #TODO: consider moving this to sweep

# --- LoRA adapter (optional, applies to all experiments) ---
# lora:
#   adapter_id: my-org/my-lora-adapter
#   merge_weights: false
# TODO: VALUDATE that this works as intended - does this apply to all backends? if not, need to clarify in docs and potentially add backend-specific lora config using dotted notation (e.g. lora.pytorch.adapter_id, lora.vllm.adapter_id, etc.)

# --- Passthrough kwargs ---
# passthrough_kwargs:
#   use_safetensors: true

# =====================================================================
# Output configuration (study-level)
# =====================================================================
# Controls where results are written and what auxiliary artefacts are persisted.
# These are operational concerns, not part of the scientific specification.

output:
  results_dir: ./results           # Base directory for study results (timestamped subdirectory created within)
  save_timeseries: true            # Persist GPU power/thermal/memory timeseries as Parquet sidecar

# =====================================================================
# Sweep axes (Cartesian product)
# =====================================================================
# Independent parameters - each value list is crossed with all others.
# Dotted paths (e.g. pytorch.batch_size) scope params to that backend.
# Each backend's scoped params are crossed only with each other and with
# universal (non-dotted) axes.

sweep: # TODO: maybe shared_sweep or global_sweep?
  # --- Universal (applies to all three backends) ---
  dtype:
    - float32
    - float16
    - bfloat16

  # --- PyTorch parameter space ---
  pytorch.batch_size:
    - 1
    - 4
    - 8
    - 16
    - 32
  pytorch.attn_implementation:
    - sdpa
    - flash_attention_2
    - flash_attention_3
    - eager

  #TODO add others - e.g. torch_compile, num_beams, quantisation, parallelisation, etc.

  # --- vLLM parameter space ---

# TODO: maybe backend_sweep ? -> separation of concerns, rather than all under sweep?

# TODO: add vllm batch size?
  vllm.engine.gpu_memory_utilization:
    - 0.7
    - 0.85
    - 0.95
  vllm.engine.enforce_eager:
    - true
    - false
  vllm.engine.max_num_seqs:
    - 64
    - 128
    - 256
  vllm.engine.enable_chunked_prefill:
    - true
    - false
  # Moved from explicit experiments: these are independent single-axis variations
  vllm.engine.enable_prefix_caching:
    - true
    - false
  vllm.engine.block_size:
    - 8
    - 16
    - 32
  vllm.engine.kv_cache_dtype:
    - auto
    - fp8
  vllm.engine.quantization:
    - null                           # No quantisation (default, full precision)
    - fp8                            # FP8 dynamic quantisation (works with any model)
    # Model-specific quantisation (requires pre-quantised model checkpoint):
    # - awq
    # - gptq
    # - marlin
    # - bitsandbytes
  vllm.engine.max_num_batched_tokens:
    - 2048
    - 4096
    - 8192
  vllm.engine.max_model_len:
    - 1024
    - 2048
    - 4096
  vllm.attention.backend:
    - flash_attn
    - flashinfer
    # - xformers                     # Legacy, deprecated in newer vLLM versions

    #TODO add others - e.g. attention backend, speculative decoding, quantisation, parallelisation, etc.

  # --- TensorRT parameter space ---
  tensorrt.max_batch_size:
    - 1
    - 4
    - 8
    - 16
    - 32
  tensorrt.max_seq_len:
    - 1536
    - 2048
  tensorrt.quant.quant_algo: # TODO: is this not tensorrt.dtype??
    - int8
    - w4a16_awq
    - w8a16
    # FP8 quantisation (commented out - requires SM >= 8.9 / Ada Lovelace / Hopper)
    # - FP8
  # Moved from explicit experiments: scheduling is an independent axis
  tensorrt.max_input_len:
    - 512
    - 1024
  tensorrt.scheduler.capacity_scheduling_policy:
    - MAX_UTILIZATION
    - STATIC_BATCH
  # tensorrt.tp_size:               # Tensor parallel (requires multi-GPU hardware)
  #   - 1
  #   - 2
  #   - 4

    # --- Shared TRT-LLM backend settings ---
# Applied to all TensorRT sweep experiments. Explicit TRT experiments
# override these where needed.
tensorrt: #TODO - IM LEAVING THIS HERE AS REMINDER TO WORK OUT WHART THIS WAS AND WHY IT WAS HERE -> REMOVE AND ASSOCIATED PATHS WITHIN THE TOOL.
  max_input_len: 1024

# =====================================================================
# Explicit experiments (truly dependent or feature-specific params)
# =====================================================================
# Only experiments with parameter dependencies or unique overrides belong here.
# Independent single-axis variations should be sweep axes (above).
#
# Remaining explicit experiments fall into these categories:
#   - Dependent params: torch_compile + mode, BnB quantisation, beam search
#   - Cross-section deps: beam search requires decoder.do_sample: false
#   - Axis overrides: speculative decoding requires batch_size: 1
#   - Compound settings: KV cache block_reuse + memory_fraction travel together
#
# TODO: These will move to sweep_groups once that feature is implemented.
# See .product/designs/sweep-constraints.md for the design.

experiments:

  # =================================================================
  # PYTORCH - dependent experiments
  # =================================================================

  # -----------------------------------------------------------------
  # torch.compile modes
  # -----------------------------------------------------------------
  # torch_compile_mode requires torch_compile: true - can't be swept
  # with torch_compile: false configs, so listed explicitly.
  #TODO change this -> can we not add another dot hierarchy?
  # depending on what the underlying pytorch field names are:
  # pytorch.torch_compile: true/false? -> pytorch.torch_compile.mode (what is the name of the underlying field is it torch_compile_mode or just mode????? make sure to use native pytorch terminology)
  # maybe e.g. pytorch.torch_compile.mode: default | reduce-overhead | max-autotune, and then have torch_compile: true/false as a separate axis? This way we could sweep torch_compile_mode with torch_compile: true, and also have torch_compile: false configs without needing to list them explicitly? Need to validate if this works as intended and how incompatible params are resolved (e.g. if torch_compile: false and torch_compile_mode: default are swept together, does it automatically disable the torch_compile_mode sweep when torch_compile is false, or does it produce invalid configs that need to be filtered out?) -> if this works as intended, we could remove the need for the explicit experiments below that test different torch_compile modes with torch_compile: true, and instead just have those as part of the sweep. The explicit experiments section would then only be needed for truly unique experiments that can't be easily captured in the sweep (e.g. specific quantisation configurations, beam search parameters, etc.) - need to validate this and potentially refactor to simplify the config and reduce the number of explicit experiments needed.
  # OR have validate that these only work when torch_compile: true and automatically filter out invalid configs if torch_compile: false - this would allow us to keep the torch_compile_mode sweep separate from the torch_compile: true/false axis, which would be cleaner and more modular - need to validate if this works as intended and how incompatible params are resolved (e.g. if torch_compile: false and torch_compile_mode: default are swept together, does it automatically disable the torch_compile_mode sweep when torch_compile is false, or does it produce invalid configs that need to be filtered out?)
  - model: Qwen/Qwen2.5-0.5B
    backend: pytorch
    dtype: bfloat16
    dataset:
      n_prompts: 50
    pytorch:
      batch_size: 4
      torch_compile: true
      torch_compile_mode: default
      torch_compile_backend: inductor
      device_map: auto
      trust_remote_code: true

  - model: Qwen/Qwen2.5-0.5B
    backend: pytorch
    dtype: bfloat16
    dataset:
      n_prompts: 50
    pytorch:
      batch_size: 4
      torch_compile: true
      torch_compile_mode: reduce-overhead
      torch_compile_backend: inductor
      device_map: auto
      trust_remote_code: true

  - model: Qwen/Qwen2.5-0.5B
    backend: pytorch
    dtype: bfloat16
    dataset:
      n_prompts: 50
    pytorch:
      batch_size: 4
      torch_compile: true
      torch_compile_mode: max-autotune
      torch_compile_backend: inductor
      device_map: auto
      trust_remote_code: true

  # -----------------------------------------------------------------
  # BitsAndBytes quantization
  # -----------------------------------------------------------------
  # 4-bit and 8-bit are mutually exclusive - cannot be swept together.
  # TODO: why are these not in sweep logic, and just have being filtered out when incompatible with load_in_8bit or load_in_4bit? If this works as intended, we could move these into the sweep and remove the need for explicit experiments here, which would simplify the config and reduce the number of explicit experiments needed - need to validate this and potentially refactor.
  - model: Qwen/Qwen2.5-0.5B
    backend: pytorch
    dtype: float16
    dataset:
      n_prompts: 50
    pytorch:
      batch_size: 4
      load_in_8bit: true
      device_map: auto
      trust_remote_code: true

  - model: Qwen/Qwen2.5-0.5B
    backend: pytorch
    dtype: float16
    dataset:
      n_prompts: 50
    pytorch:
      batch_size: 4
      load_in_4bit: true
      bnb_4bit_compute_dtype: float16
      bnb_4bit_quant_type: nf4
      device_map: auto
      trust_remote_code: true

  - model: Qwen/Qwen2.5-0.5B
    backend: pytorch
    dtype: float16
    dataset:
      n_prompts: 50
    pytorch:
      batch_size: 4
      load_in_4bit: true
      bnb_4bit_compute_dtype: float16
      bnb_4bit_quant_type: nf4
      bnb_4bit_use_double_quant: true
      device_map: auto
      trust_remote_code: true

  # -----------------------------------------------------------------
  # PyTorch beam search
  # -----------------------------------------------------------------
  # TODO: as above: move this into sweep logic and validate that incompatible params are automatically filtered out (e.g. if beam search params are swept together with sampling params, does it automatically disable the sampling params when beam search is enabled, or does it produce invalid configs that need to be filtered out?) - if this works as intended, we could move this into the sweep and remove the need for explicit experiments here, which would simplify the config and reduce the number of explicit experiments needed.
  - model: Qwen/Qwen2.5-0.5B
    backend: pytorch
    dtype: bfloat16
    dataset:
      n_prompts: 50
    decoder:
      temperature: 0.0
      do_sample: false
    pytorch:
      batch_size: 4
      num_beams: 4
      early_stopping: true
      length_penalty: 1.0
      no_repeat_ngram_size: 3
      device_map: auto
      trust_remote_code: true

  # -----------------------------------------------------------------
  # PyTorch speculative decoding (prompt-lookup)
  # -----------------------------------------------------------------
  # TODO: again as above: why is this not in sweep logic, and just have being filtered out when incompatible with do_sample: false? If this works as intended, we could move this into the sweep and remove the need for explicit experiments here, which would simplify the config and reduce the number of explicit experiments needed - need to validate this and potentially refactor.
  - model: Qwen/Qwen2.5-0.5B
    backend: pytorch
    dtype: bfloat16
    dataset:
      n_prompts: 50
    pytorch:
      batch_size: 1
      prompt_lookup_num_tokens: 3
      device_map: auto
      trust_remote_code: true

  # -----------------------------------------------------------------
  # Static KV cache
  # -----------------------------------------------------------------
  # TODO: again, as above: move this into sweep logic.
  - model: Qwen/Qwen2.5-0.5B
    backend: pytorch
    dtype: bfloat16
    dataset:
      n_prompts: 50
    pytorch:
      batch_size: 4
      use_cache: true
      cache_implementation: static
      device_map: auto
      trust_remote_code: true

  # -----------------------------------------------------------------
  # Offloaded static KV cache (dependent: cache_implementation requires use_cache)
  # -----------------------------------------------------------------
  - model: Qwen/Qwen2.5-0.5B
    backend: pytorch
    dtype: bfloat16
    dataset:
      n_prompts: 50
    pytorch:
      batch_size: 4
      use_cache: true
      cache_implementation: offloaded_static
      device_map: auto
      trust_remote_code: true

  # -----------------------------------------------------------------
  # Sliding window KV cache (dependent: cache_implementation requires use_cache)
  # -----------------------------------------------------------------
  - model: Qwen/Qwen2.5-0.5B
    backend: pytorch
    dtype: bfloat16
    dataset:
      n_prompts: 50
    pytorch:
      batch_size: 4
      use_cache: true
      cache_implementation: sliding_window
      device_map: auto
      trust_remote_code: true

  # -----------------------------------------------------------------
  # Tensor parallelism (requires multi-GPU; tp_plan and device_map are
  # mutually exclusive, so this is a dependent experiment)
  # -----------------------------------------------------------------
  # - model: Qwen/Qwen2.5-0.5B
  #   backend: pytorch
  #   dtype: bfloat16
  #   dataset:
  #     n_prompts: 50
  #   pytorch:
  #     batch_size: 4
  #     tp_plan: auto
  #     tp_size: 2
  #     trust_remote_code: true

  # -----------------------------------------------------------------
  # Model loading with revision pin + memory limits
  # -----------------------------------------------------------------
  # - model: Qwen/Qwen2.5-0.5B
  #   backend: pytorch
  #   dtype: bfloat16
  #   dataset:
  #     n_prompts: 50
  #   pytorch:
  #     batch_size: 4
  #     revision: main
  #     max_memory:
  #       0: "10GiB"
  #       cpu: "50GiB"
  #     device_map: auto
  #     trust_remote_code: true

  # PyTorch LoRA adapter (commented out - requires a real adapter TODO: remove - isn't this above????)
  # - model: Qwen/Qwen2.5-0.5B
  #   backend: pytorch
  #   dtype: bfloat16
  #   dataset:
  #     n_prompts: 50
  #   lora:
  #     adapter_id: my-org/my-lora-adapter
  #     merge_weights: false
  #   pytorch:
  #     batch_size: 4
  #     device_map: auto
  #     trust_remote_code: true

  # =================================================================
  # VLLM - dependent experiments
  # =================================================================

  # -----------------------------------------------------------------
  # Beam search (cross-section dep: requires decoder.do_sample: false;
  # mutually exclusive with vllm.sampling section)
  # -----------------------------------------------------------------
  - model: Qwen/Qwen2.5-0.5B
    backend: vllm
    dtype: bfloat16
    dataset:
      n_prompts: 50
    decoder:
      temperature: 0.0
      do_sample: false
    vllm:
      beam_search:
        beam_width: 4
        early_stopping: true
        length_penalty: 1.0
        max_tokens: 256              # Overrides universal max_output_tokens for beam search

  # -----------------------------------------------------------------
  # Sampling with penalties (mutually exclusive with beam_search section)
  # -----------------------------------------------------------------
  - model: Qwen/Qwen2.5-0.5B
    backend: vllm
    dtype: bfloat16
    dataset:
      n_prompts: 50
    decoder:
      temperature: 0.8
      do_sample: true
    vllm:
      sampling:
        presence_penalty: 0.6
        frequency_penalty: 0.6

  # -----------------------------------------------------------------
  # Tensor parallel (special: requires multi-GPU hardware)
  # -----------------------------------------------------------------
  - model: Qwen/Qwen2.5-0.5B
    backend: vllm
    dtype: bfloat16
    dataset:
      n_prompts: 50
    vllm:
      engine:
        tensor_parallel_size: 2
        disable_custom_all_reduce: false  # Disable custom all-reduce for multi-GPU
        gpu_memory_utilization: 0.9

  # -----------------------------------------------------------------
  # Attention backend fine-tuning (advanced: sub-fields of attention config)
  # -----------------------------------------------------------------
  # - model: Qwen/Qwen2.5-0.5B
  #   backend: vllm
  #   dtype: bfloat16
  #   dataset:
  #     n_prompts: 50
  #   vllm:
  #     attention:
  #       backend: flash_attn
  #       flash_attn_version: 2            # Flash attention version (auto-detected)
  #       flash_attn_max_num_splits_for_cuda_graph: 0  # Max splits for CUDA graph
  #       use_prefill_decode_attention: true
  #       use_prefill_query_quantization: false
  #       use_cudnn_prefill: false
  #       disable_flashinfer_prefill: false
  #       disable_flashinfer_q_quantization: false
  #       use_trtllm_attention: false      # Use TensorRT-LLM attention backend
  #       use_trtllm_ragged_deepseek_prefill: false
  #     engine:
  #       enforce_eager: false

  # -----------------------------------------------------------------
  # Speculative decoding (dependent: speculative_model requires
  # num_speculative_tokens; commented out - requires a real draft model)
  # -----------------------------------------------------------------
  # - model: Qwen/Qwen2.5-0.5B
  #   backend: vllm
  #   dtype: bfloat16
  #   dataset:
  #     n_prompts: 50
  #   vllm:
  #     engine:
  #       speculative_model: my-org/my-draft-model
  #       num_speculative_tokens: 5
  #       gpu_memory_utilization: 0.9

  # -----------------------------------------------------------------
  # Pipeline parallel (special: requires multi-GPU hardware)
  # -----------------------------------------------------------------
  # - model: Qwen/Qwen2.5-0.5B
  #   backend: vllm
  #   dtype: bfloat16
  #   dataset:
  #     n_prompts: 50
  #   vllm:
  #     engine:
  #       pipeline_parallel_size: 2
  #       gpu_memory_utilization: 0.9

  # -----------------------------------------------------------------
  # CPU offload (offloads model weight layers to CPU RAM)
  # -----------------------------------------------------------------
  - model: Qwen/Qwen2.5-0.5B
    backend: vllm
    dtype: bfloat16
    dataset:
      n_prompts: 50
    vllm:
      engine:
        cpu_offload_gb: 4
        gpu_memory_utilization: 0.9

  # -----------------------------------------------------------------
  # CPU offload fine-tuning (layer-level control over offloading)
  # -----------------------------------------------------------------
  # - model: Qwen/Qwen2.5-0.5B
  #   backend: vllm
  #   dtype: bfloat16
  #   dataset:
  #     n_prompts: 50
  #   vllm:
  #     engine:
  #       cpu_offload_gb: 8
  #       offload_group_size: 4          # Groups of layers for CPU offloading
  #       offload_num_in_group: 2        # Layers offloaded per group
  #       offload_prefetch_step: 1       # Prefetch steps ahead
  #       # offload_params: ["lm_head"]  # Specific parameter names to offload
  #       gpu_memory_utilization: 0.9

  # -----------------------------------------------------------------
  # Swap space for KV cache offloading
  # -----------------------------------------------------------------
  - model: Qwen/Qwen2.5-0.5B
    backend: vllm
    dtype: bfloat16
    dataset:
      n_prompts: 50
    vllm:
      engine:
        swap_space: 8
        gpu_memory_utilization: 0.85

  # -----------------------------------------------------------------
  # Sampling extensions (min_tokens, ignore_eos, multi-sequence)
  # -----------------------------------------------------------------
  - model: Qwen/Qwen2.5-0.5B
    backend: vllm
    dtype: bfloat16
    dataset:
      n_prompts: 50
    decoder:
      temperature: 0.8
      do_sample: true
    vllm:
      sampling:
        max_tokens: 256              # Overrides universal max_output_tokens for this experiment
        min_tokens: 10
        ignore_eos: false
        n: 1

  # -----------------------------------------------------------------
  # Compilation config (advanced: full vLLM compilation passthrough)
  # -----------------------------------------------------------------
  # - model: Qwen/Qwen2.5-0.5B
  #   backend: vllm
  #   dtype: bfloat16
  #   dataset:
  #     n_prompts: 50
  #   vllm:
  #     engine:
  #       compilation_config:
  #         level: 3
  #       enforce_eager: false

  # -----------------------------------------------------------------
  # Absolute KV cache memory (mutually exclusive with gpu_memory_utilization)
  # -----------------------------------------------------------------
  # - model: Qwen/Qwen2.5-0.5B
  #   backend: vllm
  #   dtype: bfloat16
  #   dataset:
  #     n_prompts: 50
  #   vllm:
  #     engine:
  #       kv_cache_memory_bytes: 4294967296    # 4 GiB
  #       enforce_eager: false

  # =================================================================
  # TENSORRT - dependent experiments
  # =================================================================
  # Note: standalone quantisation algo experiments (INT8, W4A16_AWQ, W8A16)
  # are now covered by the tensorrt.quant.quant_algo sweep axis above.
  # Only compound/dependent configs remain here.

  # -----------------------------------------------------------------
  # INT8 + KV cache quantisation (compound: kv_cache_quant requires quant_algo)
  # -----------------------------------------------------------------
  - model: Qwen/Qwen2.5-0.5B
    backend: tensorrt
    dtype: bfloat16
    dataset:
      n_prompts: 50
    tensorrt:
      max_batch_size: 8
      max_input_len: 1024
      max_seq_len: 2048
      quant:
        quant_algo: INT8
        kv_cache_quant_algo: INT8
      build_cache:
        max_cache_storage_gb: 256

  # -----------------------------------------------------------------
  # KV cache variants (compound: settings travel together)
  # -----------------------------------------------------------------
  - model: Qwen/Qwen2.5-0.5B
    backend: tensorrt
    dtype: bfloat16
    dataset:
      n_prompts: 50
    tensorrt:
      max_batch_size: 8
      max_input_len: 1024
      max_seq_len: 2048
      kv_cache:
        enable_block_reuse: true
        free_gpu_memory_fraction: 0.9
      build_cache:
        max_cache_storage_gb: 256

  - model: Qwen/Qwen2.5-0.5B
    backend: tensorrt
    dtype: bfloat16
    dataset:
      n_prompts: 50
    tensorrt:
      max_batch_size: 8
      max_input_len: 1024
      max_seq_len: 2048
      kv_cache:
        host_cache_size: 1073741824    # 1 GiB in bytes
      build_cache:
