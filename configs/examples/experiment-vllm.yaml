# vLLM single-experiment configuration (requires Docker)
# Run: llem run configs/examples/experiment-vllm.yaml
#
# Comprehensive template exercising all available vLLM backend parameters.
# vLLM runs inside a Docker container - ensure Docker + NVIDIA runtime are set up.
# All fields shown with their defaults - remove or adjust as needed.

model: meta-llama/Llama-3.2-1B
backend: vllm

# --- Data ---
n: 100
dataset: aienergyscore
dataset_order: interleaved   # interleaved | grouped | shuffled

# Synthetic dataset alternative (replace 'dataset: aienergyscore' above):
# dataset:
#   n: 100
#   input_len: 512
#   output_len: 128
#   seed: 42

# --- Hardware ---
precision: bf16              # fp32 | fp16 | bf16
random_seed: 42

# --- Token limits ---
max_input_tokens: 512
max_output_tokens: 256

# --- Energy measurement ---
energy:
  backend: auto

# --- Baseline power measurement ---
baseline:
  enabled: true
  duration_seconds: 30.0

# --- Warmup ---
warmup:
  enabled: true
  n_warmup: 5
  thermal_floor_seconds: 60.0
  # convergence_detection: false
  # cv_threshold: 0.05
  # max_prompts: 20
  # window_size: 5
  # min_prompts: 5

# --- Decoder / sampling (universal, shared across backends) ---
decoder:
  temperature: 1.0
  do_sample: true
  top_k: 50
  top_p: 1.0
  repetition_penalty: 1.0
  min_p: null                # Min probability filter
  min_new_tokens: null        # Minimum output tokens
  # preset: null             # deterministic | standard | creative | factual

# --- LoRA adapter (optional) ---
# lora:
#   adapter_id: my-org/my-lora-adapter
#   merge_weights: false

# --- vLLM backend configuration ---
vllm:
  # =====================================================================
  # Engine-level config (vllm.LLM() constructor args, loaded once at init)
  # =====================================================================
  engine:
    # --- Memory management ---
    gpu_memory_utilization: 0.9   # GPU memory fraction for KV cache (0.0 - 1.0)
    swap_space: 4.0               # CPU swap space in GiB for KV cache offloading
    # cpu_offload_gb: 0.0         # CPU RAM in GiB to offload model weights

    # --- KV cache ---
    # block_size: 16              # 8 | 16 | 32 (tokens per block)
    # kv_cache_dtype: auto        # auto | fp8 | fp8_e5m2 | fp8_e4m3

    # --- Execution mode ---
    enforce_eager: false          # true = disable CUDA graphs (useful for debugging)
    # enable_chunked_prefill: false  # Chunk large prefills for lower TTFT

    # --- Scheduler / batching ---
    max_num_seqs: 256             # Max concurrent sequences per iteration
    # max_num_batched_tokens: null   # Max tokens per scheduler iteration (null = auto)
    # max_model_len: null            # Override model's max sequence length

    # --- Parallelism ---
    tensor_parallel_size: 1
    # pipeline_parallel_size: 1

    # --- Prefix caching ---
    # enable_prefix_caching: false   # Automatic prefix caching (APC)

    # --- Quantization (requires pre-quantized checkpoint) ---
    # quantization: null          # awq | gptq | fp8 | fp8_e5m2 | fp8_e4m3 | marlin | bitsandbytes

    # --- Speculative decoding ---
    # speculative_model: null        # Draft model HF ID (requires num_speculative_tokens)
    # num_speculative_tokens: null   # Tokens per speculative step

    # --- CPU offload (layer-level) ---
    # offload_group_size: 0          # Groups of layers for offloading (0 = disabled)
    # offload_num_in_group: 1        # Layers per group
    # offload_prefetch_step: 1       # Prefetch steps ahead
    # offload_params: null           # Specific params to offload (null = all eligible)

    # --- Multi-GPU ---
    # disable_custom_all_reduce: false

    # --- Absolute KV cache (mutually exclusive with gpu_memory_utilization) ---
    # kv_cache_memory_bytes: null    # Absolute KV cache size in bytes

    # --- Compilation ---
    # compilation_config: null       # Full passthrough to vLLM CompilationConfig dict

    # --- Attention ---
    # attention:
    #   backend: null                    # flash_attn | flashinfer | etc. (null = auto)
    #   flash_attn_version: null         # Flash attention version (null = auto)
    #   flash_attn_max_num_splits_for_cuda_graph: null
    #   use_prefill_decode_attention: null    # (null = true)
    #   use_prefill_query_quantization: null  # (null = false)
    #   use_cudnn_prefill: null              # (null = false)
    #   disable_flashinfer_prefill: null     # (null = false)
    #   disable_flashinfer_q_quantization: null
    #   use_trtllm_attention: null           # (null = false)
    #   use_trtllm_ragged_deepseek_prefill: null

  # =====================================================================
  # Sampling-level config (vLLM-specific SamplingParams extensions)
  # =====================================================================
  # Universal sampling (temperature, top_k, top_p, etc.) lives in decoder: above.
  # This section is for vLLM-only extensions.
  sampling:
    # max_tokens: null           # Override max_output_tokens for vLLM-specific sweeps
    # min_tokens: 0              # Minimum output tokens before EOS allowed
    presence_penalty: 0.0
    frequency_penalty: 0.0
    # ignore_eos: false          # Force max_tokens generation
    # n: 1                       # Output sequences per prompt

  # =====================================================================
  # Beam search (mutually exclusive with sampling section)
  # =====================================================================
  # beam_search:
  #   beam_width: 4
  #   length_penalty: 1.0
  #   early_stopping: false
  #   max_tokens: null           # null = use max_output_tokens

# --- Passthrough kwargs (advanced) ---
# passthrough_kwargs:
#   trust_remote_code: true

# --- Output ---
# output_dir: null
