# Docker Compose with multiple engine support
#
# Quick Start:
#   pip install -e .              # Install llenergymeasure
#   llem config                   # Check environment
#   docker compose build transformers  # Build engine image
#
# Manual Usage:
#   Transformers (default): docker compose run --rm transformers llem --help
#   vLLM:              docker compose run --rm vllm llem --help
#   TensorRT:          docker compose run --rm tensorrt llem --help
#
# Examples:
#   # Transformers engine (default)
#   docker compose run --rm transformers llem run configs/examples/experiment-transformers.yaml
#
#   # vLLM backend
#   docker compose run --rm vllm llem run configs/examples/experiment-vllm.yaml
#
#   # TensorRT engine
#   docker compose run --rm tensorrt llem run configs/examples/experiment-tensorrt.yaml
#
#   # Development shells
#   docker compose --profile dev run --rm transformers-dev /bin/bash
#   docker compose --profile dev run --rm vllm-dev /bin/bash
#   docker compose --profile dev run --rm tensorrt-dev /bin/bash

# Shared configuration anchor
x-common: &common
  # PUID/PGID pattern for host permission mapping (like LinuxServer.io)
  # Usage: PUID=$(id -u) PGID=$(id -g) docker compose run ...
  # Container starts as root, entrypoint drops to PUID/PGID user

  # GPU access with privileged mode for NVML energy metrics
  privileged: true
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [compute, utility]

  # Environment variables
  environment:
    # PUID/PGID for host permission mapping (REQUIRED - set in .env)
    # Auto-generated by 'lem doctor' or 'lem campaign', or set manually
    - PUID=${PUID:?Run 'lem doctor' to auto-generate .env, or set PUID manually}
    - PGID=${PGID:?Run 'lem doctor' to auto-generate .env, or set PGID manually}
    # Standard config
    - HF_TOKEN
    # Default to GPU 0 if host has empty CUDA_VISIBLE_DEVICES (shared server setup)
    # Campaign/experiment CLI overrides this when targeting specific GPUs
    - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-0}
    # NVIDIA Container Toolkit: ensure compute capability for CUDA
    - NVIDIA_VISIBLE_DEVICES=all
    - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    - HF_HOME=/app/.cache/huggingface
    - PIP_NO_CACHE_DIR=1
    - CODECARBON_LOG_LEVEL=warning
    - NVIDIA_DISABLE_REQUIRE=true
    # Container sees /app paths regardless of host mount source
    - LLM_ENERGY_RESULTS_DIR=/app/results
    - LLM_ENERGY_CONFIGS_DIR=/app/configs
    - LLM_ENERGY_STATE_DIR=/app/.state

  working_dir: /app

  healthcheck:
    test: ["CMD", "python", "-c", "import torch; assert torch.cuda.is_available()"]
    interval: 30s
    timeout: 10s
    retries: 3

services:
  # ==========================================================================
  # Transformers Engine - HuggingFace Transformers + Accelerate
  # ==========================================================================
  transformers:
    <<: *common
    volumes:
      # Bind mounts: user-accessible data (resume workflow requires host access)
      - ${LLM_ENERGY_CONFIGS_DIR:-./configs}:/app/configs
      - ${LLM_ENERGY_RESULTS_DIR:-./results}:/app/results
      - ${LLM_ENERGY_STATE_DIR:-./.state}:/app/.state
      - ./scripts:/app/scripts:ro
      # Named volumes: container-managed (no permission issues)
      - hf-cache:/app/.cache/huggingface
    build:
      context: .
      dockerfile: docker/Dockerfile.transformers
      target: runtime
      args:
        LLEM_PKG_VERSION: ${LLEM_PKG_VERSION:-dev}
        LLEM_EXPCONF_SCHEMA_FINGERPRINT: ${LLEM_EXPCONF_SCHEMA_FINGERPRINT:-unknown}
    image: llenergymeasure:transformers

  transformers-dev:
    <<: *common
    volumes:
      - .:/app
      - hf-cache:/app/.cache/huggingface
    profiles: ["dev"]
    build:
      context: .
      dockerfile: docker/Dockerfile.transformers
      target: dev
      args:
        LLEM_PKG_VERSION: ${LLEM_PKG_VERSION:-dev}
        LLEM_EXPCONF_SCHEMA_FINGERPRINT: ${LLEM_EXPCONF_SCHEMA_FINGERPRINT:-unknown}
    image: llenergymeasure:transformers-dev
    entrypoint: ["/app/scripts/dev-entrypoint.sh"]
    command: []

  # ==========================================================================
  # vLLM Engine - High-performance inference with PagedAttention etc
  # ==========================================================================
  vllm:
    <<: *common
    # vLLM requires shared memory for multiprocessing
    ipc: host
    volumes:
      # Bind mounts: user-accessible data (resume workflow requires host access)
      - ${LLM_ENERGY_CONFIGS_DIR:-./configs}:/app/configs
      - ${LLM_ENERGY_RESULTS_DIR:-./results}:/app/results
      - ${LLM_ENERGY_STATE_DIR:-./.state}:/app/.state
      - ./scripts:/app/scripts:ro
      # Named volumes: container-managed (no permission issues)
      - hf-cache:/app/.cache/huggingface
    build:
      context: .
      dockerfile: docker/Dockerfile.vllm
      target: runtime
      args:
        LLEM_PKG_VERSION: ${LLEM_PKG_VERSION:-dev}
        LLEM_EXPCONF_SCHEMA_FINGERPRINT: ${LLEM_EXPCONF_SCHEMA_FINGERPRINT:-unknown}
    image: llenergymeasure:vllm

  vllm-dev:
    <<: *common
    # vLLM requires shared memory for multiprocessing
    ipc: host
    volumes:
      - .:/app
      - hf-cache:/app/.cache/huggingface
    profiles: ["dev"]
    build:
      context: .
      dockerfile: docker/Dockerfile.vllm
      target: dev
      args:
        LLEM_PKG_VERSION: ${LLEM_PKG_VERSION:-dev}
        LLEM_EXPCONF_SCHEMA_FINGERPRINT: ${LLEM_EXPCONF_SCHEMA_FINGERPRINT:-unknown}
    image: llenergymeasure:vllm-dev
    entrypoint: ["/app/scripts/dev-entrypoint.sh"]
    command: []

  # ==========================================================================
  # TensorRT-LLM Engine - High-performance compiled inference
  # ==========================================================================
  tensorrt:
    <<: *common
    # TensorRT-LLM requires shared memory for multiprocessing
    ipc: host
    volumes:
      # Bind mounts: user-accessible data (resume workflow requires host access)
      - ${LLM_ENERGY_CONFIGS_DIR:-./configs}:/app/configs
      - ${LLM_ENERGY_RESULTS_DIR:-./results}:/app/results
      - ${LLM_ENERGY_STATE_DIR:-./.state}:/app/.state
      - ./scripts:/app/scripts:ro
      # Named volumes: container-managed (no permission issues)
      - hf-cache:/app/.cache/huggingface
      - trt-engine-cache:/app/.cache/tensorrt-engines
    build:
      context: .
      dockerfile: docker/Dockerfile.tensorrt
      target: runtime
      args:
        LLEM_PKG_VERSION: ${LLEM_PKG_VERSION:-dev}
        LLEM_EXPCONF_SCHEMA_FINGERPRINT: ${LLEM_EXPCONF_SCHEMA_FINGERPRINT:-unknown}
    image: llenergymeasure:tensorrt

  tensorrt-dev:
    <<: *common
    # TensorRT-LLM requires shared memory for multiprocessing
    ipc: host
    volumes:
      - .:/app
      - hf-cache:/app/.cache/huggingface
      - trt-engine-cache:/app/.cache/tensorrt-engines
    profiles: ["dev"]
    build:
      context: .
      dockerfile: docker/Dockerfile.tensorrt
      target: dev
      args:
        LLEM_PKG_VERSION: ${LLEM_PKG_VERSION:-dev}
        LLEM_EXPCONF_SCHEMA_FINGERPRINT: ${LLEM_EXPCONF_SCHEMA_FINGERPRINT:-unknown}
    image: llenergymeasure:tensorrt-dev
    entrypoint: ["/app/scripts/dev-entrypoint.sh"]
    command: []

  # ==========================================================================
  # Legacy aliases (backwards compatibility)
  # ==========================================================================
  llenergymeasure-app:
    extends:
      service: transformers

  llenergymeasure-dev:
    extends:
      service: transformers-dev
    profiles: ["dev"]

# =============================================================================
# Named Volumes (Docker-managed, persist across container restarts)
# =============================================================================
# These volumes store large caches.
# They persist unless you explicitly run: docker compose down -v
#
# To clear specific volumes:
#   docker volume rm lem-hf-cache
#   docker volume rm lem-trt-engine-cache
#
# Note: Experiment state (.state/) is now a bind mount for resume workflow.
#
volumes:
  # HuggingFace model cache (10-100+ GB)
  hf-cache:
    name: lem-hf-cache

  # TensorRT compiled engine cache (1-10+ GB)
  trt-engine-cache:
    name: lem-trt-engine-cache
