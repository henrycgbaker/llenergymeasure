# TensorRT-LLM single-experiment configuration (requires Docker)
# Run: llem run examples/experiment-tensorrt.yaml
#
# This template exercises all available TensorRT-LLM backend parameters.
# TensorRT-LLM runs inside a Docker container — ensure Docker + NVIDIA runtime are set up.
# Engine compilation occurs on first run; subsequent runs use cached engines.
# All fields shown with their defaults — remove or adjust as needed.

model: meta-llama/Llama-3.2-1B
backend: tensorrt

# --- Data ---
n: 100
dataset: aienergyscore
dataset_order: interleaved  # interleaved | grouped | shuffled

# --- Hardware ---
precision: bf16           # fp32 | fp16 | bf16
random_seed: 42

# --- Token limits ---
max_input_tokens: 512
max_output_tokens: 128

# --- Energy measurement ---
energy:
  backend: auto

# --- Baseline power measurement ---
baseline:
  enabled: true
  duration_seconds: 30.0

# --- Warmup ---
warmup:
  enabled: true
  n_warmup: 5
  thermal_floor_seconds: 60.0

# --- Decoder / sampling (universal, shared across backends) ---
decoder:
  temperature: 1.0
  do_sample: true
  top_k: 50
  top_p: 1.0
  repetition_penalty: 1.0

# --- TensorRT-LLM backend configuration ---
tensorrt:
  # Compile-time parameters (LLM() constructor)
  # These are engine shape constants — changing any triggers recompilation.
  max_batch_size: 8         # compile-time constant, triggers recompilation
  tp_size: 1                # Tensor parallel degree; compile-time constant, triggers recompilation
  max_input_len: 1024       # Max input sequence length; compile-time constant, triggers recompilation
  max_seq_len: 2048         # Max total sequence length (input + output); compile-time constant, triggers recompilation
  dtype: bfloat16           # fp16 | bfloat16; compile-time constant, triggers recompilation
  fast_build: false         # true = reduced optimisation, faster compilation

  # TRT-LLM internal backend (advanced)
  # backend: trt            # TRT-LLM LLM(backend=...) param — not the llem backend field

  # Pre-compiled engine (skip compilation)
  # engine_path: null       # Path to pre-compiled engine directory; null = compile fresh

  # --- Quantisation ---
  # Uncomment to enable post-training quantisation.
  # Note: FP8 requires SM >= 8.9 (Ada Lovelace / Hopper). A100 users should use INT8 or W4A16_AWQ.
  # quant:
  #   quant_algo: INT8      # INT8 | W4A16_AWQ | W4A16_GPTQ | W8A16 | W8A16_GPTQ | W4A8_AWQ | NO_QUANT
  #                         # FP8 requires SM >= 8.9 (Ada/Hopper); raises ConfigurationError on A100
  #   kv_cache_quant_algo: INT8  # FP8 | INT8; KV cache quantisation (null = no KV cache quantisation)

  # --- PTQ calibration ---
  # Only needed when quant_algo requires calibration (INT8, W4A16_AWQ, etc.).
  # calib:
  #   calib_batches: 512        # Number of calibration batches (null -> 512)
  #   calib_dataset: cnn_dailymail  # Calibration dataset name or path (null -> 'cnn_dailymail')
  #   calib_max_seq_length: 512 # Max sequence length for calibration (null -> 512)

  # --- KV cache ---
  # kv_cache:
  #   enable_block_reuse: false     # Enable KV cache block reuse for repeated prefixes
  #   free_gpu_memory_fraction: 0.9 # Fraction of free GPU memory for KV cache (0.0-1.0)
  #   max_tokens: null              # Maximum tokens in KV cache (null -> auto)
  #   host_cache_size: 0            # Host (CPU) cache size in bytes; 0 = disabled

  # --- Scheduler ---
  # capacity_scheduling_policy controls how batch slots are allocated.
  # scheduler:
  #   capacity_scheduling_policy: GUARANTEED_NO_EVICT  # GUARANTEED_NO_EVICT | MAX_UTILIZATION | STATIC_BATCH

  # --- Engine build cache ---
  # Controls engine caching across runs. Enabled by default — avoids recompilation.
  build_cache:
    # cache_root: null            # Cache root directory (null -> ~/.cache/tensorrt_llm)
    # max_records: 10             # Maximum cached engine records (null -> 10)
    max_cache_storage_gb: 256     # Maximum cache storage in GB (null -> 256)

  # --- TRT-LLM-specific sampling ---
  # Universal sampling params (temperature, top_k, top_p, etc.) live in decoder: above.
  # sampling:
  #   min_tokens: 0               # Minimum output tokens before EOS allowed
  #   n: 1                        # Output sequences per prompt
  #   ignore_eos: false           # Force max_tokens generation every time
  #   return_perf_metrics: false  # Return TRT-LLM performance metrics in output

# --- Runners ---
runners:
  tensorrt: docker
