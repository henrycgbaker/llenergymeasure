# Cross-backend comparison — PyTorch vs vLLM vs TensorRT-LLM
# Run: llem run examples/study-cross-backend.yaml
#
# Compares the same model across all three backends at the same precision.
# Useful for understanding which backend is most energy-efficient for your workload.
# Requires Docker for vLLM and TensorRT-LLM backends.

name: cross-backend-comparison

# --- Shared fields ---
model: meta-llama/Llama-3.2-1B
dataset: aienergyscore
n: 50
max_input_tokens: 512
max_output_tokens: 128

decoder:
  preset: deterministic     # Greedy decoding for reproducible results

warmup:
  enabled: true
  n_warmup: 3
  thermal_floor_seconds: 30.0

baseline:
  enabled: true
  duration_seconds: 30.0

# --- Sweep ---
# Note: backend-specific sections (pytorch:, vllm:, tensorrt:) are ignored
# when an experiment does not use that backend.
sweep:
  backend:
    - pytorch
    - vllm
    - tensorrt
  precision:
    - bf16
    - fp16

# Produces 3 backends x 2 precisions = 6 experiments x 3 cycles = 18 total runs

runners:
  pytorch: local
  vllm: docker
  tensorrt: docker

execution:
  n_cycles: 3
  cycle_order: interleaved  # A,B,C,A,B,C... to control for thermal drift
  experiment_gap_seconds: 10.0
  cycle_gap_seconds: 30.0
