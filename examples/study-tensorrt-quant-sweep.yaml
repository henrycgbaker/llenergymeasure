# TRT-LLM quantisation sweep — compare quantisation algorithms on the same model
# Run: llem run examples/study-tensorrt-quant-sweep.yaml
#
# Sweeps QuantAlgo across INT8, W4A16_AWQ, W8A16 on a single model.
# Use this to find the best accuracy-efficiency tradeoff for your deployment.
# Note: FP8 requires SM >= 8.9 (Ada/Hopper). A100 users should omit FP8.

name: tensorrt-quant-sweep

# --- Shared fields ---
model: meta-llama/Llama-3.2-1B
dataset: aienergyscore
n: 50
max_input_tokens: 512
max_output_tokens: 128
backend: tensorrt

decoder:
  preset: deterministic     # Greedy decoding for reproducible results

warmup:
  enabled: true
  n_warmup: 3
  thermal_floor_seconds: 30.0

baseline:
  enabled: true
  duration_seconds: 30.0

# --- Shared TRT-LLM backend settings ---
tensorrt:
  max_batch_size: 8

# --- Sweep ---
sweep:
  tensorrt.quant.quant_algo:
    - INT8
    - W4A16_AWQ
    - W8A16
    # - FP8   # Requires SM >= 8.9 (Ada/Hopper). Uncomment on H100/RTX 4090.

# Produces 3 quant_algo values x 3 cycles = 9 total runs

runners:
  tensorrt: docker

execution:
  n_cycles: 3
  cycle_order: interleaved  # A,B,C,A,B,C... to control for thermal drift
  experiment_gap_seconds: 5.0
  cycle_gap_seconds: 15.0
