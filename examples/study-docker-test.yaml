# Quick Docker test — PyTorch + vLLM both in Docker
# Run: llem run examples/study-docker-test.yaml --cycles 1 --no-gaps
#
# Small config for testing CLI display on non-GPU hosts.

name: docker-display-test

model: gpt2
dataset: aienergyscore
n: 10
max_output_tokens: 50

warmup:
  enabled: true
  n_warmup: 2

baseline:
  enabled: true
  duration_seconds: 10.0

sweep:
  backend:
    - pytorch
    - vllm

runners:
  pytorch: docker
  vllm: docker

execution:
  n_cycles: 1
  cycle_order: sequential
  experiment_gap_seconds: 5.0
