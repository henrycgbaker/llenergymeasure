# vLLM single-experiment configuration (requires Docker)
# Run: llem run examples/experiment-vllm.yaml
#
# This template exercises all available vLLM backend parameters.
# vLLM runs inside a Docker container — ensure Docker + NVIDIA runtime are set up.
# All fields shown with their defaults — remove or adjust as needed.

model: meta-llama/Llama-3.2-1B
backend: vllm

# --- Data ---
n: 100
dataset: aienergyscore
dataset_order: interleaved  # interleaved | grouped | shuffled

# --- Hardware ---
precision: bf16           # fp32 | fp16 | bf16
random_seed: 42

# --- Token limits ---
max_input_tokens: 512
max_output_tokens: 128

# --- Energy measurement ---
energy:
  backend: auto

# --- Baseline power measurement ---
baseline:
  enabled: true
  duration_seconds: 30.0

# --- Warmup ---
warmup:
  enabled: true
  n_warmup: 5
  thermal_floor_seconds: 60.0

# --- Decoder / sampling (universal, shared across backends) ---
decoder:
  temperature: 1.0
  do_sample: true
  top_k: 50
  top_p: 1.0
  repetition_penalty: 1.0

# --- vLLM backend configuration ---
vllm:
  # Engine-level config (vllm.LLM() constructor args, loaded once at init)
  engine:
    # Memory management
    gpu_memory_utilization: 0.9  # GPU memory fraction for KV cache (0.0-1.0)
    swap_space: 4.0              # CPU swap space in GiB for KV cache offloading
    # cpu_offload_gb: 0.0        # CPU RAM in GiB to offload model weights

    # KV cache
    # block_size: 16             # 8 | 16 | 32
    # kv_cache_dtype: auto       # auto | fp8 | fp8_e5m2 | fp8_e4m3

    # Execution mode
    enforce_eager: false         # true = disable CUDA graphs
    # enable_chunked_prefill: false

    # Scheduler / batching
    max_num_seqs: 256            # Max concurrent sequences per iteration
    # max_num_batched_tokens: null  # Max tokens per scheduler iteration
    # max_model_len: null          # Override model's max sequence length

    # Parallelism
    tensor_parallel_size: 1
    # pipeline_parallel_size: 1

    # Prefix caching
    # enable_prefix_caching: false

    # Quantization (requires pre-quantized checkpoint)
    # quantization: null          # awq | gptq | fp8 | marlin | bitsandbytes

    # Speculative decoding
    # speculative_model: null     # Draft model HF ID
    # num_speculative_tokens: null  # Tokens per speculative step

    # CPU offload (layer-level)
    # offload_group_size: 0
    # offload_num_in_group: 1
    # offload_prefetch_step: 1
    # offload_params: null

    # Multi-GPU
    # disable_custom_all_reduce: false

    # Absolute KV cache (mutually exclusive with gpu_memory_utilization)
    # kv_cache_memory_bytes: null

    # Compilation
    # compilation_config: null    # Full passthrough to vLLM CompilationConfig

    # Attention
    # attention:
    #   backend: null             # flash_attn | flashinfer | etc.
    #   use_prefill_decode_attention: null

  # Sampling-level config (vLLM-specific SamplingParams extensions)
  sampling:
    # max_tokens: null            # Override max_output_tokens for vLLM-specific sweeps
    # min_tokens: 0
    presence_penalty: 0.0
    frequency_penalty: 0.0
    # ignore_eos: false           # Force max_tokens generation
    # n: 1                        # Output sequences per prompt

  # Beam search (mutually exclusive with sampling section)
  # beam_search:
  #   beam_width: 4
  #   length_penalty: 1.0
  #   early_stopping: false
  #   max_tokens: null
