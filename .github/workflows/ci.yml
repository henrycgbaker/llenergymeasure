name: CI

on:
  workflow_dispatch:
    inputs:
      job:
        description: "Job to run (all, lint, type-check, test, package-validation, docs-freshness, docker-smoke)"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - lint
          - type-check
          - test
          - package-validation
          - docs-freshness
          - docker-smoke
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  UV_FROZEN: "true"
  UV_NO_PROGRESS: "1"

jobs:
  filter:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.changes.outputs.src }}
      docker: ${{ steps.changes.outputs.docker }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: changes
        with:
          base: ${{ github.event_name == 'push' && github.ref || '' }}
          filters: |
            src:
              - 'src/**'
              - 'tests/**'
              - 'pyproject.toml'
              - 'uv.lock'
            docker:
              - 'docker/**'
              - '.dockerignore'
              - 'pyproject.toml'

  lint:
    if: >-
      github.event_name != 'workflow_dispatch'
      || inputs.job == 'all'
      || inputs.job == 'lint'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-suffix: lint-3.12
          python-version: "3.12"
      - run: uv sync --dev
      - name: Ruff lint
        run: uv run ruff check src/ tests/
      - name: Ruff format check
        run: uv run ruff format --check src/ tests/
      - name: Architecture lint
        run: uv run lint-imports

  type-check:
    if: >-
      github.event_name != 'workflow_dispatch'
      || inputs.job == 'all'
      || inputs.job == 'type-check'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-suffix: typecheck-3.12
          python-version: "3.12"
      - run: uv sync --dev
      - name: mypy
        run: uv run mypy src/

  test:
    needs: filter
    if: >-
      always()
      && (
        (github.event_name == 'workflow_dispatch' && (inputs.job == 'all' || inputs.job == 'test'))
        || needs.filter.outputs.src == 'true'
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-suffix: test-3.12
          python-version: "3.12"
      - run: uv sync --dev --extra pytorch --extra codecarbon --extra zeus
      - name: Unit + integration tests
        run: uv run pytest tests/ -m "not gpu and not docker" -n auto -v --tb=short --cov=llenergymeasure --cov-report=xml:coverage.xml
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-ci-${{ github.sha }}
          path: coverage.xml
          retention-days: 30
          if-no-files-found: ignore
      - name: Import validation
        run: uv run python -c "from llenergymeasure import run_experiment, ExperimentConfig, ExperimentResult; print('OK')"

  package-validation:
    if: >-
      github.event_name != 'workflow_dispatch'
      || inputs.job == 'all'
      || inputs.job == 'package-validation'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-suffix: pkg-3.12
          python-version: "3.12"
      - run: uv build --wheel
      - name: Install and validate
        run: |
          python -m venv /tmp/pkg-check
          /tmp/pkg-check/bin/pip install dist/*.whl --quiet
          /tmp/pkg-check/bin/python -c "
          from llenergymeasure import run_experiment, ExperimentConfig, ExperimentResult
          print('Package install OK')
          "
      - name: Version sync check
        run: |
          PYPROJECT_VER=$(python3 -c "import tomllib; f=open('pyproject.toml','rb'); print(tomllib.load(f)['project']['version'])")
          VERSION_VER=$(python3 -c "import re; s=open('src/llenergymeasure/_version.py').read(); print(re.search(r'__version__[^=]*=\s*\"([^\"]+)\"', s).group(1))")
          echo "pyproject.toml: ${PYPROJECT_VER}"
          echo "_version.py:    ${VERSION_VER}"
          [ "$PYPROJECT_VER" = "$VERSION_VER" ] || { echo "ERROR: Version mismatch: pyproject.toml=${PYPROJECT_VER}, _version.py=${VERSION_VER}"; exit 1; }

  docs-freshness:
    if: >-
      github.event_name != 'workflow_dispatch'
      || inputs.job == 'all'
      || inputs.job == 'docs-freshness'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-suffix: docs-3.12
          python-version: "3.12"
      - run: uv sync --dev
      - name: Verify doc generation scripts
        run: |
          uv run python scripts/generate_config_docs.py > /dev/null
          uv run python scripts/generate_cli_reference.py > /dev/null
          uv run python scripts/generate_invalid_combos_doc.py > /dev/null

  docker-smoke:
    needs: filter
    if: >-
      always()
      && (
        (github.event_name == 'workflow_dispatch' && (inputs.job == 'all' || inputs.job == 'docker-smoke'))
        || needs.filter.outputs.docker == 'true'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: pytorch
            blocking: true
          - dockerfile: vllm
            blocking: false
    continue-on-error: ${{ !matrix.blocking }}
    steps:
      - uses: actions/checkout@v6
      - name: Free disk space
        run: |
          # Remove large pre-installed packages that aren't needed
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h /
      - name: Build ${{ matrix.dockerfile }} image
        run: docker build -f docker/Dockerfile.${{ matrix.dockerfile }} --build-arg INSTALL_FA3=false . -t smoke-${{ matrix.dockerfile }}
      - name: Smoke test ${{ matrix.dockerfile }}
        run: |
          docker run --rm smoke-${{ matrix.dockerfile }} llem --version
          docker run --rm smoke-${{ matrix.dockerfile }} llem config
