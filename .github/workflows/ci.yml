name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  UV_FROZEN: "true"
  UV_NO_PROGRESS: "1"

jobs:
  filter:
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.changes.outputs.src }}
      docker: ${{ steps.changes.outputs.docker }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          base: ${{ github.event_name == 'push' && github.ref || '' }}
          filters: |
            src:
              - 'src/**'
              - 'tests/**'
              - 'pyproject.toml'
              - 'uv.lock'
            docker:
              - 'docker/**'
              - '.dockerignore'
              - 'pyproject.toml'

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-suffix: lint-3.12
          python-version: "3.12"
      - run: uv sync --dev
      - name: Ruff lint
        run: uv run ruff check src/ tests/
      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-suffix: typecheck-3.12
          python-version: "3.12"
      - run: uv sync --dev
      - name: mypy
        run: uv run mypy src/

  test:
    needs: filter
    if: needs.filter.outputs.src == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-suffix: test-3.12
          python-version: "3.12"
      - run: uv sync --dev --extra pytorch --extra codecarbon --extra zeus --extra webhooks
      - name: Unit + integration tests
        run: uv run pytest tests/ -m "not gpu and not docker" -n auto -v --tb=short --cov=llenergymeasure --cov-report=xml:coverage.xml
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-ci-${{ github.sha }}
          path: coverage.xml
          retention-days: 30
          if-no-files-found: ignore
      - name: Import validation
        run: uv run python -c "from llenergymeasure import run_experiment, ExperimentConfig, ExperimentResult; print('OK')"

  package-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-suffix: pkg-3.12
          python-version: "3.12"
      - run: uv build --wheel
      - name: Install and validate
        run: |
          python -m venv /tmp/pkg-check
          /tmp/pkg-check/bin/pip install dist/*.whl --quiet
          /tmp/pkg-check/bin/python -c "
          from llenergymeasure import run_experiment, ExperimentConfig, ExperimentResult
          print('Package install OK')
          "
      - name: Version sync check
        run: |
          PYPROJECT_VER=$(python3 -c "import tomllib; f=open('pyproject.toml','rb'); print(tomllib.load(f)['project']['version'])")
          INIT_VER=$(python3 -c "import re; s=open('src/llenergymeasure/__init__.py').read(); print(re.search(r'__version__[^=]*=\s*\"([^\"]+)\"', s).group(1))")
          echo "pyproject.toml: ${PYPROJECT_VER}"
          echo "__init__.py:    ${INIT_VER}"
          [ "$PYPROJECT_VER" = "$INIT_VER" ] || { echo "ERROR: Version mismatch: pyproject.toml=${PYPROJECT_VER}, __init__.py=${INIT_VER}"; exit 1; }

  docs-freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-suffix: docs-3.12
          python-version: "3.12"
      - run: uv sync --dev
      - name: Verify doc generation scripts
        run: |
          uv run python scripts/generate_config_docs.py > /dev/null
          uv run python scripts/generate_cli_reference.py > /dev/null
          uv run python scripts/generate_invalid_combos_doc.py > /dev/null

  docker-smoke:
    needs: filter
    if: needs.filter.outputs.docker == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: pytorch
            blocking: true
          - dockerfile: vllm
            blocking: false
    continue-on-error: ${{ !matrix.blocking }}
    steps:
      - uses: actions/checkout@v4
      - name: Build ${{ matrix.dockerfile }} image
        run: docker build -f docker/Dockerfile.${{ matrix.dockerfile }} . -t smoke-${{ matrix.dockerfile }}
      - name: Smoke test ${{ matrix.dockerfile }}
        run: |
          docker run --rm smoke-${{ matrix.dockerfile }} llem --version
          docker run --rm smoke-${{ matrix.dockerfile }} llem config
