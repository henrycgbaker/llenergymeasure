name: GPU CI

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  UV_FROZEN: "true"
  UV_NO_PROGRESS: "1"

jobs:
  gpu-integration:
    runs-on: self-hosted
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-suffix: gpu-3.12
          python-version: "3.12"

      - run: uv sync --dev --extra pytorch --extra codecarbon --extra zeus

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ hashFiles('tests/fixtures/model_list.txt') }}
          restore-keys: hf-models-

      - name: All tests (including GPU + Docker)
        run: uv run pytest tests/ -v --tb=short

      - name: SIGINT verification
        run: bash tests/integration/sigint_verify.sh

      - name: Upload replay fixtures
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: replay-fixtures-${{ github.sha }}
          path: tests/fixtures/replay/
          retention-days: 30
          if-no-files-found: ignore
