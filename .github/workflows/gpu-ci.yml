name: GPU CI

# Tier 2: GPU integration tests on self-hosted runner (ds01-gpu).
# Builds the pytorch Docker image from source, installs test deps, and runs
# all tests inside the container with GPU access.
#
# Triggers:
#   1. Manual:     workflow_dispatch with optional job selector (pytorch, vllm, all)
#                  `gh workflow run gpu-ci.yml`                    # all engines
#                  `gh workflow run gpu-ci.yml --field job=pytorch` # pytorch only
#                  `gh workflow run gpu-ci.yml --field job=vllm`    # vllm only
#   2. Release:    called by release.yml as reusable workflow (gates GitHub Release)
#   3. Label-gate: add 'gpu-ci' label to a PR to run GPU tests on that PR
#
# Does NOT run on every push to main. See docs/deployment.md for rationale.

on:
  workflow_dispatch:
    inputs:
      job:
        description: "Job to run (all, pytorch, vllm)"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - pytorch
          - vllm
  workflow_call:
  pull_request:
    types: [labeled, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  gpu-integration:
    # Skip PR runs unless 'gpu-ci' label is present.
    # workflow_dispatch and workflow_call always run (no PR label context).
    if: >-
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'gpu-ci')
    runs-on: self-hosted
    timeout-minutes: 60
    steps:
      - name: Clean workspace (fix root-owned files from Docker)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}":/workspace \
            alpine sh -c "find /workspace -not -user $(id -u) -delete 2>/dev/null || true"

      - uses: actions/checkout@v6

      - name: Build pytorch CI image
        if: inputs.job != 'vllm'
        run: |
          docker build \
            -f docker/Dockerfile.pytorch \
            -t llenergymeasure-ci:pytorch \
            .
          # Install test dependencies (not in production image)
          docker run --name llem-ci-setup llenergymeasure-ci:pytorch \
            pip install --no-cache-dir pytest pytest-xdist
          docker commit llem-ci-setup llenergymeasure-ci:pytorch
          docker rm llem-ci-setup

      - name: Create results directory
        run: mkdir -p results/

      - name: All tests (including GPU)
        if: inputs.job != 'vllm'
        run: |
          docker run --rm --gpus all \
            -v "${{ github.workspace }}/tests":/app/tests:ro \
            -v "${{ github.workspace }}/results":/app/results \
            llenergymeasure-ci:pytorch \
            python3 -m pytest tests/ -v --tb=short -o "addopts="

      - name: SIGINT verification
        if: inputs.job != 'vllm'
        run: |
          docker run --rm --gpus all \
            -v "${{ github.workspace }}/tests":/app/tests:ro \
            -v "${{ github.workspace }}/results":/app/results \
            llenergymeasure-ci:pytorch \
            bash tests/integration/sigint_verify.sh

      - name: Build vllm CI image
        if: inputs.job != 'pytorch'
        run: |
          docker build \
            -f docker/Dockerfile.vllm \
            -t llenergymeasure-ci:vllm \
            .
          # Install test dependencies (not in production image)
          docker run --name llem-vllm-ci-setup llenergymeasure-ci:vllm \
            pip install --no-cache-dir pytest pytest-xdist
          docker commit llem-vllm-ci-setup llenergymeasure-ci:vllm
          docker rm llem-vllm-ci-setup

      - name: vLLM killpg verification
        if: inputs.job != 'pytorch'
        run: |
          docker run --rm --gpus all \
            -v "${{ github.workspace }}/tests":/app/tests:ro \
            -v "${{ github.workspace }}/results":/app/results \
            llenergymeasure-ci:vllm \
            bash tests/integration/killpg_verify.sh

      - name: Collect replay fixtures
        if: always()
        run: |
          if [ -d "${{ github.workspace }}/results/replay" ]; then
            cp -r "${{ github.workspace }}/results/replay/"*.json \
                  "${{ github.workspace }}/tests/fixtures/replay/" 2>/dev/null || true
            echo "Replay fixtures collected:"
            ls -la "${{ github.workspace }}/tests/fixtures/replay/"
          else
            echo "No replay fixtures produced (results/replay/ not found)"
          fi

      - name: Upload replay fixtures
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: replay-fixtures-${{ github.sha }}
          path: tests/fixtures/replay/
          retention-days: 30
          if-no-files-found: ignore

      - name: Create replay fixture PR
        if: always() && github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Only proceed if fixture JSON files exist
          if ! ls tests/fixtures/replay/*.json 1>/dev/null 2>&1; then
            echo "No replay fixtures to commit"
            exit 0
          fi

          # Stage first so git detects new (untracked) files
          git add tests/fixtures/replay/*.json

          # Skip if nothing changed (staged vs HEAD)
          if git diff --cached --quiet tests/fixtures/replay/; then
            echo "Replay fixtures unchanged"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          BRANCH="chore/replay-fixtures-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git commit -m "chore(test): update replay fixtures from GPU CI"
          git push origin "$BRANCH"

          gh pr create \
            --base main \
            --title "chore(test): update replay fixtures" \
            --body "Auto-generated by GPU CI. Updates ExperimentResult replay fixtures from latest GPU run."

      - name: Cleanup pytorch image
        if: always() && inputs.job != 'vllm'
        run: docker rmi llenergymeasure-ci:pytorch 2>/dev/null || true

      - name: Cleanup vllm image
        if: always() && inputs.job != 'pytorch'
        run: docker rmi llenergymeasure-ci:vllm 2>/dev/null || true
