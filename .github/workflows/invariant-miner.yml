name: Invariant Miner — Vendor Gate

# Re-vendors the validation-rules JSON by running scripts/vendor_rules.py
# inside each engine's Docker container. Observes whether the real library
# matches the corpus's declared expected_outcome; fails CI on divergence;
# commits regenerated JSON back to the PR.
#
# Sibling of parameter-discovery.yml. Same shape, same commit-back +
# labelling + PR-comment pattern, different artifact kind.
#
# Two-tier CI per .product/designs/invariant-miner-design-2026-04-26.md §6:
#   - vendor-transformers : ubuntu-latest GH-hosted runner (CPU-safe import)
#   - vendor-vllm         : ubuntu-latest GH-hosted runner (CPU-safe import
#                           on Ampere — see vllm_dynamic_miner.py docstring
#                           and .product/research/miners-redo/research-vllm-
#                           extractor-2026-04-26.md §6; PR #444 confirmed)
#   - vendor-tensorrt     : self-hosted GPU runner inside the
#                           llenergymeasure:tensorrt Docker image
#                           (TRT-LLM 0.21.0 needs CUDA-aware env)
#
# Trigger paths (auto) — Stage 2 vendor gate, refined per the Phase-B trigger
# policy: fire only on files whose changes the vendor scripts read or replay.
# Stage-1 mining inputs (scripts/miners/*.py, refresh_invariant_rules.sh)
# move to auto-mine.yml.
#   - docker/Dockerfile.*                   (Renovate-driven image bumps)
#   - configs/validation_rules/*.yaml       (mined corpora regenerated by
#                                            auto-mine.yml or hand edits)
#   - scripts/vendor_rules.py
#   - scripts/_invariant_vendor_common.py
#
# Trigger (manual): workflow_dispatch with explicit engine choice.

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "docker/Dockerfile.*"
      - "configs/validation_rules/*.yaml"
      - "scripts/vendor_rules.py"
      - "scripts/_invariant_vendor_common.py"
  workflow_dispatch:
    inputs:
      engine:
        description: "Engine to re-vendor"
        required: true
        type: choice
        options:
          - transformers
          - vllm
          - tensorrt
          - all
      pr_number:
        description: "PR number to comment on and label (optional)"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: invariant-miner-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  CORPUS_DIR: configs/validation_rules
  VENDORED_DIR: src/llenergymeasure/config/vendored_rules

jobs:
  vendor-transformers:
    # Path filters on the pull_request trigger restrict which PRs fire this
    # workflow; workflow_dispatch always runs when explicitly invoked. No
    # per-job `if:` gate needed.
    if: github.event_name != 'workflow_dispatch' || inputs.engine == 'transformers' || inputs.engine == 'all'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Mint llem-ci-bot App token
        # Short-lived (~1 hour) GitHub App token. Events it produces
        # (commits, PR comments, label edits) are NOT subject to the
        # default GITHUB_TOKEN recursive-workflow-protection gate, so
        # the commit-back below can legitimately trigger subsequent
        # CI runs. Skipped on fork PRs (secrets are not exposed there)
        # so the workflow still runs read-only for external contributors.
        id: app-token
        if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'workflow_dispatch'
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref }}
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-suffix: vendor-rules-3.12
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --dev --extra transformers

      - name: Save current vendored JSON for diffing
        id: save_old
        run: |
          OLD_JSON="${VENDORED_DIR}/transformers.json"
          mkdir -p /tmp/rules-diff
          if [[ -f "$OLD_JSON" ]]; then
            cp "$OLD_JSON" /tmp/rules-diff/transformers.old.json
          else
            echo '{"cases":[],"divergences":[]}' > /tmp/rules-diff/transformers.old.json
          fi

      - name: Run fixpoint test against corpus
        run: |
          uv run python -c "
          import yaml
          from scripts.miners._fixpoint_test import fixpoint_test_corpus
          corpus = yaml.safe_load(open('${CORPUS_DIR}/transformers.yaml'))
          fixpoint_test_corpus(corpus)
          print('fixpoint test passed')
          "

      - name: Compute stable vendor anchor
        id: anchor
        # Pin the vendor envelope to the SHA + author date of the most
        # recent commit that touched any INPUT path. Stable across the
        # workflow's own commit-back (which only touches the output JSON),
        # so re-runs produce byte-identical envelopes on unchanged source.
        # Without this, every re-run emits fresh `vendor_commit` +
        # `vendored_at` fields, git diff picks them up, commit-back fires,
        # and the synchronize loops.
        run: |
          PATHS=(
            "docker/Dockerfile.transformers"
            "configs/validation_rules/transformers.yaml"
            "scripts/vendor_rules.py"
            "scripts/_invariant_vendor_common.py"
            "scripts/miners/transformers_miner.py"
            "scripts/miners/transformers_dynamic_miner.py"
            "scripts/miners/_fixpoint_test.py"
            "scripts/miners/_base.py"
            "scripts/refresh_invariant_rules.sh"
          )
          SHA=$(git log -1 --format=%H -- "${PATHS[@]}")
          DATE=$(git log -1 --format=%aI -- "${PATHS[@]}")
          echo "sha=${SHA:-${GITHUB_SHA}}" >> "$GITHUB_OUTPUT"
          echo "date=${DATE:-$(date -u -Iseconds)}" >> "$GITHUB_OUTPUT"

      - name: Re-vendor transformers rules
        id: vendor
        env:
          LLENERGY_VENDOR_FROZEN_AT: ${{ steps.anchor.outputs.date }}
        run: |
          uv run python scripts/vendor_rules.py \
            --engine transformers \
            --corpus "${CORPUS_DIR}/transformers.yaml" \
            --out "${VENDORED_DIR}/transformers.json" \
            --vendor-commit "${{ steps.anchor.outputs.sha }}" \
            --fail-on-divergence
          echo "vendor_exit=0" >> "$GITHUB_OUTPUT"

      - name: Classify diff
        id: diff
        run: |
          mkdir -p /tmp/rules-diff
          set +e
          uv run python scripts/diff_validation_rules.py \
            /tmp/rules-diff/transformers.old.json \
            "${VENDORED_DIR}/transformers.json" \
            --out /tmp/rules-diff/transformers.md \
            --title "Transformers rules diff"
          DIFF_EXIT=$?
          set -e
          echo "is_breaking=$([[ $DIFF_EXIT -eq 1 ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Commit regenerated rule-observations JSON
        # Runs even when vendor detected divergence — the diff comment is
        # more actionable when paired with the exact regenerated JSON on
        # the PR branch. Skipped for forks (App token isn't minted there)
        # and when no App token was provided.
        if: steps.app-token.outputs.token != '' && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          git config user.name  "llem-ci-bot[bot]"
          git config user.email "${{ secrets.APP_ID }}+llem-ci-bot[bot]@users.noreply.github.com"

          git add "${VENDORED_DIR}/transformers.json"

          if git diff --cached --quiet; then
            echo "No vendored JSON changes to commit."
            exit 0
          fi

          git commit -m "chore(config): refresh transformers rule-observations"
          # --force-with-lease guards against clobbering a concurrent push
          # from the PR author. On stale-ref failure the workflow exits
          # non-zero and a rerun picks up the latest state.
          git push --force-with-lease

      - name: Post diff comment
        if: github.event_name == 'pull_request' || inputs.pr_number != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number || inputs.pr_number }}"
          if [[ -z "$PR_NUMBER" ]]; then
            echo "No PR number available, skipping comment."
            exit 0
          fi
          if [[ -f /tmp/rules-diff/transformers.md ]]; then
            gh pr comment "$PR_NUMBER" --body-file /tmp/rules-diff/transformers.md
          fi

      - name: Apply label
        if: github.event_name == 'pull_request' || inputs.pr_number != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number || inputs.pr_number }}"
          if [[ -z "$PR_NUMBER" ]]; then
            exit 0
          fi
          if [[ "${{ steps.diff.outputs.is_breaking }}" == "true" ]]; then
            gh pr edit "$PR_NUMBER" --add-label "rules-breaking" --remove-label "rules-safe" 2>/dev/null || true
          else
            gh pr edit "$PR_NUMBER" --add-label "rules-safe" --remove-label "rules-breaking" 2>/dev/null || true
          fi

      - name: Note divergence (non-fatal — see #424)
        if: steps.vendor.outputs.vendor_exit != '0'
        run: |
          echo "::warning::Rules diverge from declared expected_outcome — see ${VENDORED_DIR}/transformers.json > .divergences[]. Tracking re-enable in #424."

  vendor-vllm:
    # vLLM is CPU-importable on Ampere (see vllm_dynamic_miner.py docstring
    # and .product/research/miners-redo/research-vllm-extractor-2026-04-26.md
    # §6; PR #444 confirmed CI runs on ubuntu-latest), so this gate runs on
    # the GH-hosted runner just like vendor-transformers. Closes #445.
    if: github.event_name != 'workflow_dispatch' || inputs.engine == 'vllm' || inputs.engine == 'all'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Mint llem-ci-bot App token
        # Short-lived (~1 hour) GitHub App token. Events it produces
        # (commits, PR comments, label edits) are NOT subject to the
        # default GITHUB_TOKEN recursive-workflow-protection gate, so
        # the commit-back below can legitimately trigger subsequent
        # CI runs. Skipped on fork PRs (secrets are not exposed there)
        # so the workflow still runs read-only for external contributors.
        id: app-token
        if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'workflow_dispatch'
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref }}
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          # vLLM wheels are large; isolated cache prevents the transformers
          # cache key from getting polluted by vllm-specific install state.
          cache-suffix: vendor-rules-vllm-3.12
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --dev --extra vllm

      - name: Save current vendored JSON for diffing
        id: save_old
        run: |
          OLD_JSON="${VENDORED_DIR}/vllm.json"
          mkdir -p /tmp/rules-diff
          if [[ -f "$OLD_JSON" ]]; then
            cp "$OLD_JSON" /tmp/rules-diff/vllm.old.json
          else
            echo '{"cases":[],"divergences":[]}' > /tmp/rules-diff/vllm.old.json
          fi

      - name: Run fixpoint test against corpus
        run: |
          uv run python -c "
          import yaml
          from scripts.miners._fixpoint_test import fixpoint_test_corpus
          corpus = yaml.safe_load(open('${CORPUS_DIR}/vllm.yaml'))
          fixpoint_test_corpus(corpus)
          print('fixpoint test passed')
          "

      - name: Compute stable vendor anchor
        id: anchor
        # Pin the vendor envelope to the SHA + author date of the most
        # recent commit that touched any INPUT path. Stable across the
        # workflow's own commit-back (which only touches the output JSON),
        # so re-runs produce byte-identical envelopes on unchanged source.
        # Without this, every re-run emits fresh `vendor_commit` +
        # `vendored_at` fields, git diff picks them up, commit-back fires,
        # and the synchronize loops.
        run: |
          PATHS=(
            "docker/Dockerfile.vllm"
            "configs/validation_rules/vllm.yaml"
            "scripts/vendor_rules.py"
            "scripts/_invariant_vendor_common.py"
            "scripts/miners/vllm_static_miner.py"
            "scripts/miners/vllm_dynamic_miner.py"
            "scripts/miners/_fixpoint_test.py"
            "scripts/miners/_base.py"
            "scripts/miners/_pydantic_lift.py"
            "scripts/miners/_msgspec_lift.py"
            "scripts/refresh_invariant_rules.sh"
          )
          SHA=$(git log -1 --format=%H -- "${PATHS[@]}")
          DATE=$(git log -1 --format=%aI -- "${PATHS[@]}")
          echo "sha=${SHA:-${GITHUB_SHA}}" >> "$GITHUB_OUTPUT"
          echo "date=${DATE:-$(date -u -Iseconds)}" >> "$GITHUB_OUTPUT"

      - name: Re-vendor vllm rules
        id: vendor
        env:
          LLENERGY_VENDOR_FROZEN_AT: ${{ steps.anchor.outputs.date }}
        run: |
          uv run python scripts/vendor_rules.py \
            --engine vllm \
            --corpus "${CORPUS_DIR}/vllm.yaml" \
            --out "${VENDORED_DIR}/vllm.json" \
            --vendor-commit "${{ steps.anchor.outputs.sha }}" \
            --fail-on-divergence
          echo "vendor_exit=0" >> "$GITHUB_OUTPUT"

      - name: Classify diff
        id: diff
        run: |
          mkdir -p /tmp/rules-diff
          set +e
          uv run python scripts/diff_validation_rules.py \
            /tmp/rules-diff/vllm.old.json \
            "${VENDORED_DIR}/vllm.json" \
            --out /tmp/rules-diff/vllm.md \
            --title "vLLM rules diff"
          DIFF_EXIT=$?
          set -e
          echo "is_breaking=$([[ $DIFF_EXIT -eq 1 ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Commit regenerated rule-observations JSON
        # Runs even when vendor detected divergence — the diff comment is
        # more actionable when paired with the exact regenerated JSON on
        # the PR branch. Skipped for forks (App token isn't minted there)
        # and when no App token was provided.
        if: steps.app-token.outputs.token != '' && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          git config user.name  "llem-ci-bot[bot]"
          git config user.email "${{ secrets.APP_ID }}+llem-ci-bot[bot]@users.noreply.github.com"

          git add "${VENDORED_DIR}/vllm.json"

          if git diff --cached --quiet; then
            echo "No vendored JSON changes to commit."
            exit 0
          fi

          git commit -m "chore(config): refresh vllm rule-observations"
          # --force-with-lease guards against clobbering a concurrent push
          # from the PR author. On stale-ref failure the workflow exits
          # non-zero and a rerun picks up the latest state.
          git push --force-with-lease

      - name: Post diff comment
        if: github.event_name == 'pull_request' || inputs.pr_number != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number || inputs.pr_number }}"
          if [[ -z "$PR_NUMBER" ]]; then
            echo "No PR number available, skipping comment."
            exit 0
          fi
          if [[ -f /tmp/rules-diff/vllm.md ]]; then
            gh pr comment "$PR_NUMBER" --body-file /tmp/rules-diff/vllm.md
          fi

      - name: Apply label
        if: github.event_name == 'pull_request' || inputs.pr_number != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number || inputs.pr_number }}"
          if [[ -z "$PR_NUMBER" ]]; then
            exit 0
          fi
          if [[ "${{ steps.diff.outputs.is_breaking }}" == "true" ]]; then
            gh pr edit "$PR_NUMBER" --add-label "rules-breaking" --remove-label "rules-safe" 2>/dev/null || true
          else
            gh pr edit "$PR_NUMBER" --add-label "rules-safe" --remove-label "rules-breaking" 2>/dev/null || true
          fi

      - name: Note divergence (non-fatal — see #424)
        if: steps.vendor.outputs.vendor_exit != '0'
        run: |
          echo "::warning::Rules diverge from declared expected_outcome — see ${VENDORED_DIR}/vllm.json > .divergences[]. Tracking re-enable in #424."

  vendor-tensorrt:
    # TRT-LLM 0.21.0 cannot be imported on a CPU host (loads CUDA bindings on
    # import), so the vendor gate runs inside the llenergymeasure:tensorrt
    # Docker image on the project's self-hosted GPU runner. Closes #435.
    #
    # Path filters on the pull_request trigger restrict which PRs fire this
    # workflow; workflow_dispatch always runs when explicitly invoked. The
    # job runs whenever the workflow fires - the GPU runner is shared infra
    # and the image is layer-cached, so the marginal cost is small. Per-engine
    # path-filter scoping is tracked in #382.
    if: github.event_name != 'workflow_dispatch' || inputs.engine == 'tensorrt' || inputs.engine == 'all'
    runs-on: self-hosted
    timeout-minutes: 60
    steps:
      - name: Mint llem-ci-bot App token
        # Mirrors the transformers job's token strategy. Skipped on fork PRs
        # (secrets unavailable); workflow still runs read-only there.
        id: app-token
        if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'workflow_dispatch'
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Clean workspace (fix root-owned files from prior Docker runs)
        # Mirror gpu-ci.yml: container-written artefacts persist as root-owned
        # on the self-hosted runner and break subsequent checkouts otherwise.
        run: |
          docker run --rm \
            -v "${{ github.workspace }}":/workspace \
            alpine sh -c "find /workspace -not -user $(id -u) -delete 2>/dev/null || true"

      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref }}
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}

      - name: Resolve TRT-LLM version
        id: version
        run: |
          VER=$(grep -oE '^ARG[[:space:]]+TRTLLM_VERSION=[^[:space:]]+' \
                  docker/Dockerfile.tensorrt | head -1 | cut -d= -f2-)
          if [[ -z "$VER" ]]; then
            echo "Could not extract TRTLLM_VERSION from Dockerfile.tensorrt" >&2
            exit 1
          fi
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "image=llenergymeasure:tensorrt-${VER}" >> "$GITHUB_OUTPUT"

      - name: Build or reuse TRT-LLM image
        # Build only if the version-tagged image is missing - the runner's
        # Docker layer cache makes the FROM nvcr.io/.../release:VER step a
        # no-op when the NGC tag is unchanged, so this is a cheap check.
        run: |
          IMAGE="${{ steps.version.outputs.image }}"
          if ! docker image inspect "$IMAGE" >/dev/null 2>&1; then
            echo "Building $IMAGE from docker/Dockerfile.tensorrt..."
            docker build \
              -f docker/Dockerfile.tensorrt \
              -t "$IMAGE" \
              --build-arg TRTLLM_VERSION="${{ steps.version.outputs.version }}" \
              .
          else
            echo "Reusing cached $IMAGE."
          fi

      - name: Save current vendored JSON for diffing
        id: save_old
        run: |
          OLD_JSON="${VENDORED_DIR}/tensorrt.json"
          mkdir -p /tmp/rules-diff
          if [[ -f "$OLD_JSON" ]]; then
            cp "$OLD_JSON" /tmp/rules-diff/tensorrt.old.json
          else
            echo '{"cases":[],"divergences":[]}' > /tmp/rules-diff/tensorrt.old.json
          fi

      - name: Compute stable vendor anchor
        id: anchor
        # Mirror the transformers anchor: pin the envelope to the SHA + author
        # date of the most recent commit touching any INPUT path. Stable across
        # the workflow's own commit-back so re-runs on unchanged source emit
        # byte-identical envelopes.
        run: |
          PATHS=(
            "docker/Dockerfile.tensorrt"
            "configs/validation_rules/tensorrt.yaml"
            "scripts/vendor_rules.py"
            "scripts/_invariant_vendor_common.py"
            "scripts/miners/tensorrt_miner.py"
            "scripts/miners/tensorrt_static_miner.py"
            "scripts/miners/_base.py"
            "scripts/refresh_invariant_rules.sh"
          )
          SHA=$(git log -1 --format=%H -- "${PATHS[@]}")
          DATE=$(git log -1 --format=%aI -- "${PATHS[@]}")
          echo "sha=${SHA:-${GITHUB_SHA}}" >> "$GITHUB_OUTPUT"
          echo "date=${DATE:-$(date -u -Iseconds)}" >> "$GITHUB_OUTPUT"

      - name: Re-vendor tensorrt rules inside container
        id: vendor
        env:
          IMAGE: ${{ steps.version.outputs.image }}
          ANCHOR_SHA: ${{ steps.anchor.outputs.sha }}
          ANCHOR_DATE: ${{ steps.anchor.outputs.date }}
        # NOTE: --fail-on-divergence intentionally OMITTED for the first
        # operational run of the gate. Issue #435 expects to surface drift -
        # PR #434 shipped the corpus with --skip-validation, and the gate's
        # first observation is informational while we triage how to bring the
        # corpus into alignment with live Pydantic validation behaviour.
        # LD_LIBRARY_PATH override: the NGC image's bundled CUDA compat libs
        # must precede the host driver bind-mount path so libtensorrt_llm.so
        # resolves CUDA 12.4+ symbols against the bundled library on hosts
        # whose driver predates the NGC image's CUDA target. See
        # docker/Dockerfile.tensorrt for the full rationale.
        run: |
          set +e
          docker run --rm --gpus all \
            -e LD_LIBRARY_PATH="/usr/local/cuda/compat/lib.real:/usr/local/cuda/compat/lib:/usr/local/tensorrt/lib" \
            -e LLENERGY_VENDOR_FROZEN_AT="${ANCHOR_DATE}" \
            -e PYTHONDONTWRITEBYTECODE=1 \
            -v "${{ github.workspace }}:/repo" \
            -w /repo \
            --entrypoint python3 \
            "$IMAGE" \
            scripts/vendor_rules.py \
              --engine tensorrt \
              --corpus "${CORPUS_DIR}/tensorrt.yaml" \
              --out "${VENDORED_DIR}/tensorrt.json" \
              --image-ref "$IMAGE" \
              --base-image-ref "nvcr.io/nvidia/tensorrt-llm/release:${{ steps.version.outputs.version }}" \
              --vendor-commit "${ANCHOR_SHA}"
          echo "vendor_exit=$?" >> "$GITHUB_OUTPUT"
          set -e

      - name: Fix container-written file ownership
        # vendor_rules.py wrote the JSON as root inside the container; reclaim
        # ownership so subsequent steps (git add, commit) can read it.
        if: always()
        run: |
          docker run --rm \
            -v "${{ github.workspace }}":/workspace \
            alpine sh -c "chown -R $(id -u):$(id -g) /workspace 2>/dev/null || true"

      - name: Classify diff
        id: diff
        run: |
          mkdir -p /tmp/rules-diff
          set +e
          python3 scripts/diff_validation_rules.py \
            /tmp/rules-diff/tensorrt.old.json \
            "${VENDORED_DIR}/tensorrt.json" \
            --out /tmp/rules-diff/tensorrt.md \
            --title "TensorRT-LLM rules diff"
          DIFF_EXIT=$?
          set -e
          echo "is_breaking=$([[ $DIFF_EXIT -eq 1 ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Commit regenerated rule-observations JSON
        # Mirror the transformers commit-back: even when divergence was
        # detected the regenerated JSON is more actionable when paired with
        # the diff comment. Skipped for forks and when no App token minted.
        if: steps.app-token.outputs.token != '' && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          git config user.name  "llem-ci-bot[bot]"
          git config user.email "${{ secrets.APP_ID }}+llem-ci-bot[bot]@users.noreply.github.com"

          git add "${VENDORED_DIR}/tensorrt.json"

          if git diff --cached --quiet; then
            echo "No vendored JSON changes to commit."
            exit 0
          fi

          git commit -m "chore(config): refresh tensorrt rule-observations"
          git push --force-with-lease

      - name: Post diff comment
        if: github.event_name == 'pull_request' || inputs.pr_number != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number || inputs.pr_number }}"
          if [[ -z "$PR_NUMBER" ]]; then
            echo "No PR number available, skipping comment."
            exit 0
          fi
          if [[ -f /tmp/rules-diff/tensorrt.md ]]; then
            gh pr comment "$PR_NUMBER" --body-file /tmp/rules-diff/tensorrt.md
          fi

      - name: Apply label
        if: github.event_name == 'pull_request' || inputs.pr_number != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number || inputs.pr_number }}"
          if [[ -z "$PR_NUMBER" ]]; then
            exit 0
          fi
          if [[ "${{ steps.diff.outputs.is_breaking }}" == "true" ]]; then
            gh pr edit "$PR_NUMBER" --add-label "rules-breaking" --remove-label "rules-safe" 2>/dev/null || true
          else
            gh pr edit "$PR_NUMBER" --add-label "rules-safe" --remove-label "rules-breaking" 2>/dev/null || true
          fi

      - name: Note divergence (non-fatal — first operational run, see #435)
        if: steps.vendor.outputs.vendor_exit != '0'
        run: |
          echo "::warning::TensorRT-LLM rules diverge from declared expected_outcome — see ${VENDORED_DIR}/tensorrt.json > .divergences[]. First operational gate run for this corpus; --fail-on-divergence will be re-enabled once the corpus is brought into alignment with live Pydantic validation."
