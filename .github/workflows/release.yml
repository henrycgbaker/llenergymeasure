name: Release

on:
  push:
    tags: ["v*"]

env:
  UV_FROZEN: "true"
  UV_NO_PROGRESS: "1"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-suffix: lint-3.12
          python-version: "3.12"
      - run: uv sync --extra dev
      - name: Ruff lint
        run: uv run ruff check src/ tests/
      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-suffix: type-check-3.12
          python-version: "3.12"
      - run: uv sync --extra dev
      - name: mypy
        run: uv run mypy src/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-suffix: test-${{ matrix.python-version }}
          python-version: ${{ matrix.python-version }}
      - run: uv sync --extra dev
      - name: Unit tests
        run: uv run pytest tests/unit/ -m "not gpu" -v --tb=short
      - name: Import validation
        run: uv run python -c "from llenergymeasure import run_experiment, ExperimentConfig, ExperimentResult; print('OK')"

  release:
    needs: [lint, type-check, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-suffix: release-3.12
          python-version: "3.12"
      - name: Build package
        run: uv build
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

  docker:
    needs: release
    uses: ./.github/workflows/docker-publish.yml
    with:
      version: ${{ github.ref_name }}
    permissions:
      contents: read
      packages: write
