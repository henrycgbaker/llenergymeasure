name: Release

on:
  push:
    tags: ["v*"]

env:
  UV_FROZEN: "true"
  UV_NO_PROGRESS: "1"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-suffix: lint-3.12
          python-version: "3.12"
      - run: uv sync --dev
      - name: Ruff lint
        run: uv run ruff check src/ tests/
      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-suffix: type-check-3.12
          python-version: "3.12"
      - run: uv sync --dev
      - name: mypy
        run: uv run mypy src/

  validate-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate tag matches pyproject.toml
        run: |
          TAG="${GITHUB_REF_NAME}"
          PYPROJECT_VER=$(python3 -c "import tomllib; f=open('pyproject.toml','rb'); print('v' + tomllib.load(f)['project']['version'])")
          echo "Tag: ${TAG}"
          echo "pyproject.toml reports: ${PYPROJECT_VER}"
          [ "${TAG}" = "${PYPROJECT_VER}" ] || { echo "MISMATCH: tag=${TAG}, pyproject=${PYPROJECT_VER}"; exit 1; }

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-suffix: test-${{ matrix.python-version }}
          python-version: ${{ matrix.python-version }}
      - run: uv sync --dev --extra pytorch --extra codecarbon --extra zeus
      - name: Unit + integration tests
        run: uv run pytest tests/ -m "not gpu and not docker" -n auto -v --tb=short --cov=llenergymeasure --cov-report=xml:coverage.xml
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12' && always()
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
      - name: Upload coverage artifact
        if: matrix.python-version == '3.12' && always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-release-${{ github.sha }}
          path: coverage.xml
          retention-days: 30
          if-no-files-found: ignore
      - name: Import validation
        run: uv run python -c "from llenergymeasure import run_experiment, ExperimentConfig, ExperimentResult; print('OK')"

  release:
    needs: [lint, type-check, test, validate-version]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-suffix: release-3.12
          python-version: "3.12"
      - name: Build package
        run: uv build
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

  docker:
    needs: release
    uses: ./.github/workflows/docker-publish.yml
    with:
      version: ${{ github.ref_name }}
    permissions:
      contents: read
      packages: write
