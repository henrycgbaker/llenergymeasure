name: Docker Publish

# Builds and pushes all backend Docker images to GHCR on release.
# Called by release.yml after tests pass, or manually via workflow_dispatch.

on:
  workflow_call:
    inputs:
      version:
        description: "Version tag (e.g. v0.9.0)"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v0.9.0)"
        required: true
        type: string

env:
  REGISTRY: ghcr.io

jobs:
  docker-publish:
    strategy:
      matrix:
        backend: [pytorch, vllm, tensorrt]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.version }}

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.backend }}
          tags: |
            type=raw,value=${{ inputs.version }}
            type=raw,value=latest

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.${{ matrix.backend }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
