name: Docker Publish

# Builds and pushes all backend Docker images to GHCR on release.
# Called by release.yml after tests pass, or manually via workflow_dispatch.

on:
  workflow_call:
    inputs:
      version:
        description: "Version tag (e.g. v0.9.0)"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v0.9.0)"
        required: true
        type: string

env:
  REGISTRY: ghcr.io

jobs:
  docker-publish:
    strategy:
      matrix:
        backend: [pytorch, vllm, tensorrt]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.version }}

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.backend }}
          tags: |
            type=raw,value=${{ inputs.version }}
            type=raw,value=latest

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install llenergymeasure (base deps only)
        run: pip install .
      - id: fingerprint
        run: |
          value=$(python3 scripts/compute_expconf_fingerprint.py)
          echo "value=${value}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.${{ matrix.backend }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            LLEM_PKG_VERSION=${{ inputs.version }}
            LLEM_EXPCONF_SCHEMA_FINGERPRINT=${{ steps.fingerprint.outputs.value }}
          # Share BuildKit layer cache across machines via GHCR. Pulling the
          # :latest layers turns a cold flash-attn FA2+FA3 rebuild (~15 min)
          # into a warm rebuild (<5 min) on any dev box or fresh runner.
          # mode=max exports intermediate layers too (including the heavy
          # flash-attn compile) so downstream builders actually hit them.
          cache-from: |
            type=registry,ref=ghcr.io/${{ github.repository }}/${{ matrix.backend }}:latest
            type=registry,ref=ghcr.io/${{ github.repository }}/${{ matrix.backend }}:${{ inputs.version }}
          cache-to: |
            type=registry,ref=ghcr.io/${{ github.repository }}/${{ matrix.backend }}:latest,mode=max
