name: Docker Publish

on:
  push:
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - backend: vllm
            dockerfile: docker/Dockerfile.vllm
          - backend: pytorch
            dockerfile: docker/Dockerfile.pytorch
          # Future milestones add entries here:
          # - backend: tensorrt
          #   dockerfile: docker/Dockerfile.tensorrt
          # - backend: sglang
          #   dockerfile: docker/Dockerfile.sglang

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/henrycgbaker/llenergymeasure/${{ matrix.backend }}
          flavor: |
            latest=auto
            suffix=-cuda12
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.backend }}
          cache-to: type=gha,mode=max,scope=${{ matrix.backend }}
