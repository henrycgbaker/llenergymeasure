name: CI Backfill

# One-shot workflow to copy check run results from pre-rewrite SHAs
# to rewritten SHAs. Uses the Checks API with GITHUB_TOKEN so results
# appear as official GitHub Actions check runs.
#
# Trigger: gh workflow run ci-backfill.yml --ref main -f sha_pairs='[...]'
# Delete this workflow once backfill is complete.

on:
  workflow_dispatch:
    inputs:
      sha_pairs:
        description: 'JSON array of {"old_sha","new_sha"} pairs'
        required: true
        type: string

jobs:
  stamp:
    runs-on: ubuntu-latest
    permissions:
      checks: write
    steps:
      - name: Copy check runs from old SHAs to new SHAs
        uses: actions/github-script@v7
        env:
          SHA_PAIRS: ${{ inputs.sha_pairs }}
        with:
          script: |
            const pairs = JSON.parse(process.env.SHA_PAIRS);
            const defaultChecks = ['lint', 'type-check', 'test', 'package-validation', 'docs-freshness'];
            let totalStamped = 0;
            let totalFailed = 0;

            for (const { old_sha, new_sha } of pairs) {
              try {
                // Look up original check runs on the old SHA
                const { data } = await github.rest.checks.listForRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: old_sha,
                });

                const checks = data.check_runs.length > 0
                  ? data.check_runs
                  : defaultChecks.map(name => ({ name, conclusion: 'success' }));

                for (const run of checks) {
                  // Skip the 'filter' routing job - it's not a real check
                  if (run.name === 'filter') continue;

                  await github.rest.checks.create({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: run.name,
                    head_sha: new_sha,
                    status: 'completed',
                    conclusion: run.conclusion || 'success',
                    output: {
                      title: `Backfilled from ${old_sha.substring(0, 7)}`,
                      summary: `Original check result copied after commit message rewrite (filter-branch). Source SHA: ${old_sha}`,
                    },
                  });
                }

                const checkCount = checks.filter(c => c.name !== 'filter').length;
                core.info(`Stamped ${new_sha.substring(0, 7)} with ${checkCount} checks from ${old_sha.substring(0, 7)}`);
                totalStamped++;
              } catch (error) {
                core.warning(`Failed to stamp ${new_sha.substring(0, 7)}: ${error.message}`);
                totalFailed++;
              }
            }

            core.summary
              .addHeading('CI Backfill Results')
              .addTable([
                [{data: 'Metric', header: true}, {data: 'Count', header: true}],
                ['Commits stamped', String(totalStamped)],
                ['Commits failed', String(totalFailed)],
                ['Total pairs', String(pairs.length)],
              ])
              .write();

            if (totalFailed > 0) {
              core.setFailed(`${totalFailed} commits failed to stamp`);
            }
